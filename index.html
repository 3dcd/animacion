function fitCanvas() {
  if (!canvas || !anim_container || !dom_overlay_container) return;
  var w = 1080, h = 1920;
  var iw = window.innerWidth || document.documentElement.clientWidth || 1;
  var ih = window.innerHeight || document.documentElement.clientHeight || 1;
  var s = Math.min(iw / w, ih / h);
  var cw = Math.round(w * s), ch = Math.round(h * s);

  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
  anim_container.style.width = iw + 'px';
  anim_container.style.height = ih + 'px';
  dom_overlay_container.style.width = cw + 'px';
  dom_overlay_container.style.height = ch + 'px';
}

function init() {
  canvas = document.getElementById('canvas');
  anim_container = document.getElementById('animation_container');
  dom_overlay_container = document.getElementById('dom_overlay_container');

  var comp = AdobeAn.getComposition('19FF88706EFF471CAC137C8039763952');
  var atlasImg = new Image();
  atlasImg.onload = function() {
    handleCompleteEmbedded(comp, atlasImg);
  };
  atlasImg.src = EMBEDDED_ATLAS;
}

function handleCompleteEmbedded(comp, atlasImg) {
  var lib = comp.getLibrary();
  var ss = comp.getSpriteSheet();
  var ssMetadata = lib.ssMetadata;

  for (var i = 0; i < ssMetadata.length; i++) {
    ss[ssMetadata[i].name] = new createjs.SpriteSheet({
      images: [atlasImg],
      frames: ssMetadata[i].frames
    });
  }

  exportRoot = new lib.clientes9();
  stage = new lib.Stage(canvas);

  createjs.Touch.enable(stage, true, false);
  stage.enableMouseOver(0);
  stage.addChild(exportRoot);

  createjs.Ticker.timingMode = createjs.Ticker.RAF_SYNCHED;
  createjs.Ticker.framerate = lib.properties.fps;
  createjs.Ticker.addEventListener('tick', stage);

  AdobeAn.compositionLoaded(lib.properties.id);
  fitCanvas();
  window.addEventListener('resize', fitCanvas);
  setupInteractions();
}

function setupInteractions() {
  function pulseClick(target) {
    try {
      target.dispatchEvent('click');
    } catch (e) {
      if (target.gotoAndPlay) target.gotoAndPlay(1);
      else if (target.play) target.play();
    }
  }

  function makeDraggable(mc, opts) {
    if (!mc || mc._dragReady) return;
    mc._dragReady = true;
    mc.cursor = 'pointer';

    mc.on('mousedown', function(evt) {
      if (mc._dragTween) mc._dragTween.setPaused(true);
      mc._dragData = {
        startStageX: evt.stageX,
        startStageY: evt.stageY,
        baseX: mc.x,
        baseY: mc.y
      };
      mc._dragMoved = false;
    });

    mc.on('pressmove', function(evt) {
      if (!mc._dragData) return;
      var dx = evt.stageX - mc._dragData.startStageX;
      var dy = evt.stageY - mc._dragData.startStageY;
      if (Math.abs(dx) + Math.abs(dy) > 3) mc._dragMoved = true;

      if (opts.mode === 'vertical') {
        mc.x = mc._dragData.baseX;
        mc.y = mc._dragData.baseY + dy * (opts.dampingY || 0.35);
      } else {
        mc.x = mc._dragData.baseX + dx * (opts.dampingX || 0.12);
        mc.y = mc._dragData.baseY + dy * (opts.dampingY || 0.12);
      }
    });

    mc.on('pressup', function(evt) {
      if (!mc._dragData) return;

      var dx = evt.stageX - mc._dragData.startStageX;
      var dy = evt.stageY - mc._dragData.startStageY;
      var dist = Math.sqrt(dx * dx + dy * dy);
      var trigger = false;

      if (opts.mode === 'vertical') {
        trigger = Math.abs(dy) > (opts.threshold || 85);
      } else {
        trigger = dist > (opts.threshold || 42);
      }

      mc._dragTween = createjs.Tween.get(mc, {override: true})
        .to({x: mc._dragData.baseX, y: mc._dragData.baseY}, opts.returnMs || 220, createjs.Ease.quadOut);

      mc._dragData = null;

      if (trigger) {
        if (typeof opts.onTrigger === 'function') opts.onTrigger(mc, dx, dy);
      } else if (!mc._dragMoved && typeof opts.onTap === 'function') {
        opts.onTap(mc);
      }
    });
  }

  function armCurrentButtons() {
    if (!exportRoot) return;

    ['button_1', 'button_2', 'button_3', 'button_4', 'button_5', 'button_6'].forEach(function(name) {
      var mc = exportRoot[name] || (exportRoot.presupuesto && exportRoot.presupuesto[name]);
      if (!mc) return;
      makeDraggable(mc, {
        mode: name === 'button_1' ? 'vertical' : 'free',
        threshold: name === 'button_1' ? 52 : 42,
        dampingX: 0.11,
        dampingY: name === 'button_1' ? 0.12 : 0.11,
        returnMs: 180,
        onTrigger: function(target) { pulseClick(target); },
        onTap: function(target) { pulseClick(target); }
      });
    });

    ['B1A', 'B1B'].forEach(function(name) {
      var mc = (exportRoot.presupuesto && exportRoot.presupuesto[name]) || exportRoot[name];
      if (!mc) return;
      makeDraggable(mc, {
        mode: 'free',
        threshold: 34,
        dampingX: 0.08,
        dampingY: 0.08,
        returnMs: 160,
        onTrigger: function(target) { pulseClick(target); },
        onTap: function(target) { pulseClick(target); }
      });
    });
  }

  armCurrentButtons();
  createjs.Ticker.on('tick', armCurrentButtons);
}
