function resizeCanvas(){
  if(!canvas||!stage||!lib)return;
  var w=lib.properties.width,h=lib.properties.height;
  var vw=window.innerWidth||document.documentElement.clientWidth||w;
  var vh=window.innerHeight||document.documentElement.clientHeight||h;
  var scale=Math.min(vw/w,vh/h);
  if(!isFinite(scale)||scale<=0)scale=1;
  var dpr=Math.max(1,window.devicePixelRatio||1);

  anim_container.style.width=(w*scale)+"px";
  anim_container.style.height=(h*scale)+"px";
  dom_overlay_container.style.width=(w*scale)+"px";
  dom_overlay_container.style.height=(h*scale)+"px";
  canvas.style.width=(w*scale)+"px";
  canvas.style.height=(h*scale)+"px";

  canvas.width=Math.round(w*scale*dpr);
  canvas.height=Math.round(h*scale*dpr);

  stage.scaleX=stage.scaleY=scale*dpr;
  stage.tickOnUpdate=false;
  stage.update();
  stage.tickOnUpdate=true;
}

function startAnimation(){
  exportRoot = new lib.logo();
  stage = new lib.Stage(canvas);
  stage.addChild(exportRoot);
  createjs.Ticker.framerate = lib.properties.fps;
  createjs.Ticker.addEventListener("tick", stage);
  window.addEventListener("resize", resizeCanvas, {passive:true});
  window.addEventListener("orientationchange", resizeCanvas, {passive:true});
  resizeCanvas();
  AdobeAn.compositionLoaded(lib.properties.id);
}

function init(){
  canvas=document.getElementById("canvas");
  anim_container=document.getElementById("animation_container");
  dom_overlay_container=document.getElementById("dom_overlay_container");
  comp=AdobeAn.getComposition("39F8F0FF24A14F9AA9E95CAB9BADA657");
  lib=comp.getLibrary();
  var images=comp.getImages();
  var img=new Image();
  img.decoding="async";
  img.onload=function(){
    images.cara=img;
    startAnimation();
  };
  img.onerror=function(){
    document.body.innerHTML='<div style="font-family:Arial,sans-serif;padding:24px;text-align:center">No se pudo cargar la imagen embebida.</div>';
  };
  img.src=embeddedImages.cara;
}
</script>
</head>
<body onload="init()">
<div id="wrap">
  <div id="animation_container" style="width:1080px;height:1920px">
    <canvas id="canvas" width="1080" height="1920"></canvas>
    <div id="dom_overlay_container" style="width:1080px;height:1920px"></div>
  </div>
</div>
</body>
