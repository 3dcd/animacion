<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="authoring-tool" content="Adobe_Animate_CC">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>demo_cambas</title>
<style>
	html, body {
		margin: 0;
		padding: 0;
		width: 100%;
		height: 100%;
		background: #ffffff;
		overflow: hidden;
		overscroll-behavior: none;
		touch-action: none;
	}
	body {
		display: flex;
		align-items: center;
		justify-content: center;
	}
	#animation_container {
		position: relative;
		margin: 0 auto;
		transform-origin: 0 0;
	}
	canvas {
		position: absolute;
		display: block;
		image-rendering: auto;
		-webkit-tap-highlight-color: rgba(0,0,0,0);
	}
	#dom_overlay_container {
		pointer-events: none;
		overflow: hidden;
		position: absolute;
		left: 0;
		top: 0;
	}
</style>
<script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>
<script src="demo_cambas.js"></script>
<script>
var canvas, stage, exportRoot, anim_container, dom_overlay_container, fnStartAnimation;
function init() {
	canvas = document.getElementById("canvas");
	anim_container = document.getElementById("animation_container");
	dom_overlay_container = document.getElementById("dom_overlay_container");
	var comp=AdobeAn.getComposition("6649B68DE9064DF2AB91E9D7E465594A");
	var lib=comp.getLibrary();
	var loader = new createjs.LoadQueue(false);
	loader.addEventListener("fileload", function(evt){handleFileLoad(evt,comp)});
	loader.addEventListener("complete", function(evt){handleComplete(evt,comp)});
	loader.loadManifest(lib.properties.manifest);
}
function handleFileLoad(evt, comp) {
	var images=comp.getImages();	
	if (evt && (evt.item.type == "image")) { images[evt.item.id] = evt.result; }	
}
function handleComplete(evt,comp) {
	var lib=comp.getLibrary();
	var ss=comp.getSpriteSheet();
	var queue = evt.target;
	var ssMetadata = lib.ssMetadata;
	for(var i=0; i<ssMetadata.length; i++) {
		ss[ssMetadata[i].name] = new createjs.SpriteSheet({"images": [queue.getResult(ssMetadata[i].name)], "frames": ssMetadata[i].frames});
	}
	exportRoot = new lib.demo_cambas();
	stage = new lib.Stage(canvas);
	stage.enableMouseOver(0);
	createjs.Touch.enable(stage, true, false);
	fnStartAnimation = function() {
		stage.addChild(exportRoot);
		createjs.Ticker.framerate = lib.properties.fps;
		createjs.Ticker.addEventListener("tick", stage);
	};
	AdobeAn.makeResponsive(true, 'both', true, 1, [canvas, anim_container, dom_overlay_container]);
	AdobeAn.compositionLoaded(lib.properties.id);
	fnStartAnimation();
}
window.addEventListener('orientationchange', function(){ setTimeout(function(){ window.dispatchEvent(new Event('resize')); }, 250); });
</script>
</head>
<body onload="init();">
	<div id="animation_container" style="background-color:rgba(255, 255, 255, 1.00); width:1080px; height:1920px">
		<canvas id="canvas" width="1080" height="1920" style="background-color:rgba(255, 255, 255, 1.00);"></canvas>
		<div id="dom_overlay_container" style="width:1080px; height:1920px; display:block;"></div>
	</div>
</body>
</html>
