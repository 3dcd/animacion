<script>
var canvas, stage, exportRoot, anim_container, dom_overlay_container, fnStartAnimation;
function init() {
	canvas = document.getElementById("canvas");
	anim_container = document.getElementById("animation_container");
	dom_overlay_container = document.getElementById("dom_overlay_container");
	var comp=AdobeAn.getComposition("056D7DD7403046F3A38011080527CFDA");
	var lib=comp.getLibrary();
	var loader = new createjs.LoadQueue(false);
	loader.addEventListener("fileload", function(evt){handleFileLoad(evt,comp)});
	loader.addEventListener("complete", function(evt){handleComplete(evt,comp)});
	var lib=comp.getLibrary();
	loader.loadManifest(lib.properties.manifest);
}
function handleFileLoad(evt, comp) {
	var images=comp.getImages();	
	if (evt && (evt.item.type == "image")) { images[evt.item.id] = evt.result; }	
}
function handleComplete(evt,comp) {
	//This function is always called, irrespective of the content. You can use the variable "stage" after it is created in token create_stage.
	var lib=comp.getLibrary();
	var ss=comp.getSpriteSheet();
	var queue = evt.target;
	var ssMetadata = lib.ssMetadata;
	for(i=0; i<ssMetadata.length; i++) {
		ss[ssMetadata[i].name] = new createjs.SpriteSheet( {"images": [queue.getResult(ssMetadata[i].name)], "frames": ssMetadata[i].frames} )
	}
	exportRoot = new lib.west_tambo3();
	stage = new lib.Stage(canvas);
	stage.enableMouseOver();	
	//Registers the "tick" event listener.
	fnStartAnimation = function() {
		stage.addChild(exportRoot);
		createjs.Ticker.framerate = lib.properties.fps;
		createjs.Ticker.addEventListener("tick", stage);
	}	    
	//Code to support hidpi screens and responsive scaling.
	window.lockedMobileFit();	
	AdobeAn.compositionLoaded(lib.properties.id);
	fnStartAnimation();
	window.lockedMobileFit && window.lockedMobileFit();
	setTimeout(function(){ if(window.setupPabloIndependentDrags && exportRoot && stage){ window.setupPabloIndependentDrags(exportRoot, stage); } }, 250);
}
</script>

<script>
(function(){
  const SW=1080;
  const SH=1920;

  function fit(){
    const c=document.getElementById('animation_container');
    if(!c) return;
    const vw=window.innerWidth || document.documentElement.clientWidth || SW;
    const vh=window.innerHeight || document.documentElement.clientHeight || SH;
    const scale=Math.min(vw/SW, vh/SH);
    const x=(vw-(SW*scale))/2;
    const y=(vh-(SH*scale))/2;
    c.style.transform='translate3d('+x+'px,'+y+'px,0) scale('+scale+')';
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        c.classList.add('ready');
      });
    });
  }

  function block(e){
    if(e.cancelable) e.preventDefault();
    return false;
  }

  document.addEventListener('gesturestart', block, {passive:false});
  document.addEventListener('gesturechange', block, {passive:false});
  document.addEventListener('gestureend', block, {passive:false});
  document.addEventListener('touchstart', function(e){
    if(e.touches && e.touches.length>1 && e.cancelable) e.preventDefault();
  }, {passive:false});
  document.addEventListener('touchmove', function(e){
    if(e.touches && e.touches.length>1 && e.cancelable) e.preventDefault();
  }, {passive:false});

  let lastTouchEnd=0;
  document.addEventListener('touchend', function(e){
    const now=Date.now();
    if(now-lastTouchEnd<=300 && e.cancelable) e.preventDefault();
    lastTouchEnd=now;
  }, {passive:false});

  window.addEventListener('resize', function(){ setTimeout(fit,80); });
  window.addEventListener('orientationchange', function(){ setTimeout(fit,300); });
  window.addEventListener('load', function(){
    setTimeout(fit,80);
    setTimeout(fit,500);
  });

  window.lockedMobileFit=fit;

  function findByName(root, names){
    for(let i=0;i<names.length;i++){
      if(root && root[names[i]]) return root[names[i]];
    }
    return null;
  }

  function collectTargets(root){
    const targets=[];

    const b1=findByName(root, ['button1','button_1','Button1','Button_1']);
    const b2=findByName(root, ['button2','button_2','Button2','Button_2']);
    const b3=findByName(root, ['button3','button_3','Button3','Button_3']);
    const b4=findByName(root, ['button4','button_4','Button4','Button_4']);

    if(b1) targets.push(b1);
    if(b2) targets.push(b2);
    if(b3) targets.push(b3);
    if(b4) targets.push(b4);

    // Dentro del button3 puede estar button3B1 y button3B2.
    if(b3){
      const b3b1=findByName(b3, ['button3B1','button_3B1','button3b1','button_3b1','Button3B1']);
      const b3b2=findByName(b3, ['button3B2','button_3B2','button3b2','button_3b2','Button3B2']);
      if(b3b1) targets.push(b3b1);
      if(b3b2) targets.push(b3b2);
    }

    return targets.filter(Boolean);
  }

  function makeDrag(mc, stage){
    if(!mc || mc.__pabloDragReady) return;
    mc.__pabloDragReady=true;
    mc.mouseEnabled=true;
    mc.cursor='pointer';

    let homeX=mc.x;
    let homeY=mc.y;
    let dragging=false;
    let returning=false;
    let offsetX=0;
    let offsetY=0;

    mc.on('mousedown', function(evt){
      if(!mc.parent) return;
      homeX=mc.x;
      homeY=mc.y;
      dragging=true;
      returning=false;

      if(mc.parent && mc.parent.addChild) mc.parent.addChild(mc);

      const pt=mc.parent.globalToLocal(evt.stageX, evt.stageY);
      offsetX=mc.x-pt.x;
      offsetY=mc.y-pt.y;
    });

    mc.on('pressmove', function(evt){
      if(!dragging || !mc.parent) return;
      const pt=mc.parent.globalToLocal(evt.stageX, evt.stageY);
      mc.x=pt.x+offsetX;
      mc.y=pt.y+offsetY;
      if(stage) stage.update();
    });

    mc.on('pressup', function(){
      if(!dragging) return;
      dragging=false;
      returning=true;

      // No inventa etiquetas: ejecuta el play propio del MovieClip.
      try{
        if(typeof mc.play==='function') mc.play();
      }catch(e){}
    });

    createjs.Ticker.on('tick', function(){
      if(!returning || dragging) return;

      // Vuelta suave sin rebote: easing directo, frenando.
      const ease=0.16;
      mc.x += (homeX-mc.x)*ease;
      mc.y += (homeY-mc.y)*ease;

      if(Math.abs(homeX-mc.x)<0.4 && Math.abs(homeY-mc.y)<0.4){
        mc.x=homeX;
        mc.y=homeY;
        returning=false;
      }
    });
  }

  window.setupPabloIndependentDrags=function(root, stage){
    if(!root || !stage || root.__pabloDragsInstalled) return;

    function tryInstall(){
      const targets=collectTargets(root);
      targets.forEach(function(mc){ makeDrag(mc, stage); });
      if(targets.length){
        root.__pabloDragsInstalled=true;
        console.log('Arrastres instalados:', targets.length);
      }
    }

    tryInstall();
    setTimeout(tryInstall,300);
    setTimeout(tryInstall,1000);

    const watch=createjs.Ticker.on('tick', function(){
      if(root.__pabloDragsInstalled){
        createjs.Ticker.off('tick', watch);
      }else{
        tryInstall();
      }
    });
  };
})();
</script>

		<canvas id="canvas" width="1080" height="1920" style="position: absolute; display: block; background-color:rgba(255, 255, 255, 1.00);"></canvas>
		<div id="dom_overlay_container" style="pointer-events:none; overflow:hidden; width:1080px; height:1920px; position: absolute; left: 0px; top: 0px; display: block;">
		</div>
	</div>
