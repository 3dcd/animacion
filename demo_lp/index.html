<style>
  #animation_container {
	position:absolute;
	margin:auto;
	left:0;right:0;
	top:0;bottom:0;
  }

<script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>

<script>
var canvas, stage, exportRoot, anim_container, dom_overlay_container, fnStartAnimation;
function init() {
	canvas = document.getElementById("canvas");
	anim_container = document.getElementById("animation_container");
	dom_overlay_container = document.getElementById("dom_overlay_container");
	var comp=AdobeAn.getComposition("645E201B47AF4D5688EB99C52C6EFA7B");
	var lib=comp.getLibrary();
	var loader = new createjs.LoadQueue(false);
	loader.addEventListener("fileload", function(evt){handleFileLoad(evt,comp)});
	loader.addEventListener("complete", function(evt){handleComplete(evt,comp)});
	var lib=comp.getLibrary();
	loader.loadManifest(lib.properties.manifest);
}
function handleFileLoad(evt, comp) {
	var images=comp.getImages();	
	if (evt && (evt.item.type == "image")) { images[evt.item.id] = evt.result; }	
}
function handleComplete(evt,comp) {
	//This function is always called, irrespective of the content. You can use the variable "stage" after it is created in token create_stage.
	var lib=comp.getLibrary();
	var ss=comp.getSpriteSheet();
	var queue = evt.target;
	var ssMetadata = lib.ssMetadata;
	for(i=0; i<ssMetadata.length; i++) {
		ss[ssMetadata[i].name] = new createjs.SpriteSheet( {"images": [queue.getResult(ssMetadata[i].name)], "frames": ssMetadata[i].frames} )
	}
	exportRoot = new lib.demo();
	exportRoot.addEventListener("tick", AdobeAn.handleFilterCache);
	stage = new lib.Stage(canvas);	
	//Registers the "tick" event listener.
	fnStartAnimation = function() {
		stage.addChild(exportRoot);
		createjs.Ticker.framerate = lib.properties.fps;
		createjs.Ticker.addEventListener("tick", stage);
	}	    
	//Code to support hidpi screens and responsive scaling.
	AdobeAn.makeResponsive(true,'both',true,1,[canvas,anim_container,dom_overlay_container]);	
	AdobeAn.compositionLoaded(lib.properties.id);
	fnStartAnimation();
	setupLuzPielLupa();
}


// --- Interacción Luz & Piel: máscara dinámica sin tocar el diseño ---
function setupLuzPielLupa(){
    var root = exportRoot;
    if (!root || root.__luzPielReady) return;
    root.__luzPielReady = true;

    // Fundamental para celular: habilita eventos touch sobre el canvas.
    if (window.stage && createjs.Touch && createjs.Touch.isSupported()) {
        createjs.Touch.enable(window.stage, true, false);
    }
    if (window.stage) {
        window.stage.enableMouseOver(10);
        window.stage.mouseMoveOutside = true;
    }

    var INTERACTION_FRAME = 43;
    var AUTO_PLAY_MS = 8500;
    var RADIUS = 112;
    var started = false;
    var userTouched = false;
    var autoTimer = null;
    var demoTween = null;
    var maskShape = null;

    function safeShow(mc, alpha){
        if (!mc) return;
        mc._off = false;
        mc.visible = true;
        mc.alpha = alpha;
    }

    function syncMask(){
        if (!root.marco || !root.rostro || !maskShape) return;
        maskShape.x = root.marco.x;
        maskShape.y = root.marco.y;
    }

    function gotoEnd(){
        if (!root || root.__luzPielReleased) return;
        root.__luzPielReleased = true;
        if (autoTimer) clearTimeout(autoTimer);
        if (demoTween) createjs.Tween.removeTweens(root.marco);
        createjs.Tween.removeTweens(root.marco);
        if (root.marco) {
            createjs.Tween.get(root.marco)
                .to({x:315.1, y:509.05}, 250, createjs.Ease.quadOut)
                .call(function(){
                    syncMask();
                    root.play();
                });
        } else {
            root.play();
        }
    }

    function startIdleDemo(){
        if (!root.marco || userTouched) return;
        var points = [
            {x:315, y:509},
            {x:390, y:555},
            {x:350, y:650},
            {x:250, y:590},
            {x:315, y:509}
        ];
        var tw = createjs.Tween.get(root.marco, {loop:true});
        points.forEach(function(p){ tw.to(p, 1200, createjs.Ease.sineInOut).call(syncMask); });
        demoTween = tw;
        root.marco.addEventListener('tick', syncMask);
    }

    function install(){
        if (started || root.currentFrame < INTERACTION_FRAME) return;
        started = true;

        // No se agrega al escenario: solo funciona como máscara, por eso no aparece negro.
        maskShape = new createjs.Shape();
        maskShape.graphics.beginFill('#000').drawCircle(0,0,RADIUS);

        safeShow(root.rostro, 0);
        safeShow(root.marco, 0);
        root.rostro.mask = maskShape;
        syncMask();

        createjs.Tween.get(root.rostro).to({alpha:1}, 650, createjs.Ease.quadOut);
        createjs.Tween.get(root.marco).to({alpha:1}, 650, createjs.Ease.quadOut);

        root.marco.cursor = 'pointer';
        root.marco.mouseEnabled = true;
        root.marco.mouseChildren = false;

        // El marco es un aro: a veces el centro transparente no toma eventos.
        // Esta hitArea invisible hace que todo el círculo sea arrastrable.
        var hit = new createjs.Shape();
        hit.graphics.beginFill('#000').drawCircle(0, 0, RADIUS + 24);
        root.marco.hitArea = hit;

        root.marco.on('mousedown', function(evt){
            userTouched = true;
            root.__luzPielReleased = false;
            if (autoTimer) clearTimeout(autoTimer);
            if (demoTween) createjs.Tween.removeTweens(root.marco);
            createjs.Tween.removeTweens(root.marco);
            var pt = root.globalToLocal(evt.stageX, evt.stageY);
            root.__dragOffsetX = root.marco.x - pt.x;
            root.__dragOffsetY = root.marco.y - pt.y;
        });

        root.marco.on('pressmove', function(evt){
            var pt = root.globalToLocal(evt.stageX, evt.stageY);
            var nx = pt.x + (root.__dragOffsetX || 0);
            var ny = pt.y + (root.__dragOffsetY || 0);
            // Límites suaves dentro de la zona útil del rostro.
            nx = Math.max(180, Math.min(500, nx));
            ny = Math.max(340, Math.min(805, ny));
            root.marco.x = nx;
            root.marco.y = ny;
            syncMask();
        });

        root.marco.on('pressup', function(){
            gotoEnd();
        });

        startIdleDemo();
        autoTimer = setTimeout(function(){ if (!userTouched) gotoEnd(); }, AUTO_PLAY_MS);
    }

    createjs.Ticker.on('tick', function(){
        install();
        syncMask();
    });
}

</script>

<body onload="init();" style="margin:0px; overflow:hidden; touch-action:none;">
	<div id="animation_container" style="background-color:rgba(245, 236, 225, 1.00); width:810px; height:1439px">
		<canvas id="canvas" width="810" height="1439" style="position: absolute; display: block; background-color:rgba(245, 236, 225, 1.00); touch-action:none;"></canvas>
		<div id="dom_overlay_container" style="pointer-events:none; overflow:hidden; width:810px; height:1439px; position: absolute; left: 0px; top: 0px; display: block;">
		</div>
	</div>
</body>
