<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="authoring-tool" content="Adobe_Animate_CC">
<title>demo 3</title>
<!-- write your code here -->
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: rgba(245, 236, 225, 1.00);
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }
  #animation_container {
    position: absolute;
    overflow: hidden;
    touch-action: none;
  }
  canvas {
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
  }
</style>
<script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>
<script src="demo 3.js"></script>
<script>
var canvas, stage, exportRoot, anim_container, dom_overlay_container, fnStartAnimation;
function init() {
	canvas = document.getElementById("canvas");
	anim_container = document.getElementById("animation_container");
	dom_overlay_container = document.getElementById("dom_overlay_container");
	var comp=AdobeAn.getComposition("645E201B47AF4D5688EB99C52C6EFA7B");
	var lib=comp.getLibrary();
	var loader = new createjs.LoadQueue(false);
	loader.addEventListener("fileload", function(evt){handleFileLoad(evt,comp)});
	loader.addEventListener("complete", function(evt){handleComplete(evt,comp)});
	var lib=comp.getLibrary();
	loader.loadManifest(lib.properties.manifest);
}
function handleFileLoad(evt, comp) {
	var images=comp.getImages();	
	if (evt && (evt.item.type == "image")) { images[evt.item.id] = evt.result; }	
}

function resizeProject() {
	var stageW = 810;
	var stageH = 1639;
	var safeH = 1439; // zona visual original; el extra vertical queda como aire/fondo
	var w = window.innerWidth || document.documentElement.clientWidth || stageW;
	var h = window.innerHeight || document.documentElement.clientHeight || stageH;
	var tallLikePhone = (h / w) >= (safeH / stageW);
	var s = tallLikePhone ? (w / stageW) : (h / safeH);
	// En escritorio grande no agranda por encima del tamaño exportado.
	if (w > 900 && s > 1) { s = 1; }
	var cssW = Math.round(stageW * s);
	var cssH = Math.round(stageH * s);
	var left = Math.round((w - cssW) / 2);
	var top = Math.round((h - cssH) / 2);
	anim_container.style.width = cssW + 'px';
	anim_container.style.height = cssH + 'px';
	anim_container.style.left = left + 'px';
	anim_container.style.top = top + 'px';
	canvas.style.width = cssW + 'px';
	canvas.style.height = cssH + 'px';
	dom_overlay_container.style.width = cssW + 'px';
	dom_overlay_container.style.height = cssH + 'px';
}

function handleComplete(evt,comp) {
	//This function is always called, irrespective of the content. You can use the variable "stage" after it is created in token create_stage.
	var lib=comp.getLibrary();
	var ss=comp.getSpriteSheet();
	var queue = evt.target;
	var ssMetadata = lib.ssMetadata;
	for(i=0; i<ssMetadata.length; i++) {
		ss[ssMetadata[i].name] = new createjs.SpriteSheet( {"images": [queue.getResult(ssMetadata[i].name)], "frames": ssMetadata[i].frames} )
	}
	exportRoot = new lib.demo3();
	stage = new lib.Stage(canvas);
	createjs.Touch.enable(stage, true, false);
	stage.mouseMoveOutside = true;
	canvas.style.touchAction = "none";	
	//Registers the "tick" event listener.
	fnStartAnimation = function() {
		stage.addChild(exportRoot);
		createjs.Ticker.framerate = lib.properties.fps;
		createjs.Ticker.addEventListener("tick", stage);
	}	    
	// Responsive custom: usa el ancho en celulares largos y mantiene zona segura en tablets/PC.
	resizeProject();
	window.addEventListener('resize', resizeProject);	
	AdobeAn.compositionLoaded(lib.properties.id);
	fnStartAnimation();
}
</script>
<!-- write your code here -->
</head>
<body onload="init();" style="margin:0px; overflow:hidden; touch-action:none;">
	<div id="animation_container" style="background-color:rgba(245, 236, 225, 1.00); width:810px; height:1639px">
		<canvas id="canvas" width="810" height="1639" style="position: absolute; display: block; background-color:rgba(245, 236, 225, 1.00);"></canvas>
		<div id="dom_overlay_container" style="pointer-events:none; overflow:hidden; width:810px; height:1639px; position: absolute; left: 0px; top: 0px; display: block;">
		</div>
	</div>
</body>
</html>
