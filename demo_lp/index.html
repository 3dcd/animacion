<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="authoring-tool" content="Adobe_Animate_CC">
<title>demo</title>
<style>
  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: rgba(245, 236, 225, 1);
    -webkit-text-size-adjust: 100%;
    touch-action: manipulation;
  }
  body {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #animation_container {
    position: relative;
    width: 810px;
    height: 1439px;
    transform-origin: center center;
    overflow: hidden;
    background-color: rgba(245, 236, 225, 1);
  }
  #canvas {
    position: absolute;
    display: block;
    left: 0;
    top: 0;
    width: 810px;
    height: 1439px;
    background-color: rgba(245, 236, 225, 1);
  }
  #dom_overlay_container {
    pointer-events: none;
    overflow: hidden;
    width: 810px;
    height: 1439px;
    position: absolute;
    left: 0;
    top: 0;
    display: block;
  }
</style>
<script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>
<script src="demo.js"></script>
<script>
var canvas, stage, exportRoot, anim_container, dom_overlay_container, fnStartAnimation;

function init() {
  canvas = document.getElementById("canvas");
  anim_container = document.getElementById("animation_container");
  dom_overlay_container = document.getElementById("dom_overlay_container");

  var comp = AdobeAn.getComposition("645E201B47AF4D5688EB99C52C6EFA7B");
  var lib = comp.getLibrary();
  var loader = new createjs.LoadQueue(false);
  loader.addEventListener("fileload", function(evt){ handleFileLoad(evt, comp); });
  loader.addEventListener("complete", function(evt){ handleComplete(evt, comp); });
  loader.loadManifest(lib.properties.manifest);
}

function handleFileLoad(evt, comp) {
  var images = comp.getImages();
  if (evt && evt.item.type === "image") images[evt.item.id] = evt.result;
}

function handleComplete(evt, comp) {
  var lib = comp.getLibrary();
  var ss = comp.getSpriteSheet();
  var queue = evt.target;
  var ssMetadata = lib.ssMetadata;

  for (var i = 0; i < ssMetadata.length; i++) {
    ss[ssMetadata[i].name] = new createjs.SpriteSheet({
      images: [queue.getResult(ssMetadata[i].name)],
      frames: ssMetadata[i].frames
    });
  }

  exportRoot = new lib.demo();
  stage = new lib.Stage(canvas);
  stage.snapToPixelEnabled = true;
  createjs.Touch.enable(stage, true, false);
  stage.enableMouseOver(0);

  fnStartAnimation = function() {
    stage.addChild(exportRoot);
    createjs.Ticker.timingMode = createjs.Ticker.RAF_SYNCHED;
    createjs.Ticker.framerate = lib.properties.fps;
    createjs.Ticker.addEventListener("tick", stage);
  };

  fitCanvas();
  window.addEventListener("resize", fitCanvas, { passive: true });
  window.addEventListener("orientationchange", function(){ setTimeout(fitCanvas, 150); }, { passive: true });

  AdobeAn.compositionLoaded(lib.properties.id);
  fnStartAnimation();
}

function fitCanvas() {
  if (!stage || !canvas) return;

  var comp = AdobeAn.getComposition("645E201B47AF4D5688EB99C52C6EFA7B");
  var lib = comp.getLibrary();
  var w = lib.properties.width;
  var h = lib.properties.height;
  var ratio = window.devicePixelRatio || 1;
  var availW = document.documentElement.clientWidth;
  var availH = document.documentElement.clientHeight;
  var scale = Math.min(availW / w, availH / h);

  canvas.width = Math.round(w * ratio * scale);
  canvas.height = Math.round(h * ratio * scale);

  [canvas, anim_container, dom_overlay_container].forEach(function(el) {
    el.style.width = Math.round(w * scale) + "px";
    el.style.height = Math.round(h * scale) + "px";
  });

  stage.scaleX = ratio * scale;
  stage.scaleY = ratio * scale;
  stage.tickOnUpdate = false;
  stage.update();
  stage.tickOnUpdate = true;
}
</script>
</head>
<body onload="init();">
  <div id="animation_container">
    <canvas id="canvas" width="810" height="1439"></canvas>
    <div id="dom_overlay_container"></div>
  </div>
</body>
</html>
