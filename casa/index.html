<style>

    border:1px solid rgba(244,230,208,.55); border-radius:18px; padding:18px 24px;

    box-shadow:0 0 28px rgba(255,185,90,.18); max-width:78vw; line-height:1.25;

  #start_button small { display:block; opacity:.72; font-size:12px; margin-top:8px; }

<script>
var canvas, stage, exportRoot, anim_container, dom_overlay_container, fnStartAnimation;
function init() {
	canvas = document.getElementById("canvas");
	anim_container = document.getElementById("animation_container");
	dom_overlay_container = document.getElementById("dom_overlay_container");
	var comp=AdobeAn.getComposition("1214B6B5EC3848A7A25A5618AC420808");
	var lib=comp.getLibrary();
	var loader = new createjs.LoadQueue(false);
	loader.installPlugin(createjs.Sound);
	loader.addEventListener("fileload", function(evt){handleFileLoad(evt,comp)});
	loader.addEventListener("complete", function(evt){handleComplete(evt,comp)});
	var lib=comp.getLibrary();
	loader.loadManifest(lib.properties.manifest);
}
function handleFileLoad(evt, comp) {
	var images=comp.getImages();	
	if (evt && (evt.item.type == "image")) { images[evt.item.id] = evt.result; }	
}
function handleComplete(evt,comp) {
	//This function is always called, irrespective of the content. You can use the variable "stage" after it is created in token create_stage.
	var lib=comp.getLibrary();
	var ss=comp.getSpriteSheet();
	var queue = evt.target;
	var ssMetadata = lib.ssMetadata;
	for(i=0; i<ssMetadata.length; i++) {
		ss[ssMetadata[i].name] = new createjs.SpriteSheet( {"images": [queue.getResult(ssMetadata[i].name)], "frames": ssMetadata[i].frames} )
	}
	exportRoot = new lib.casa();
	stage = new lib.Stage(canvas);	
	//Registers the "tick" event listener.
	fnStartAnimation = function() {
		stage.addChild(exportRoot);
		createjs.Ticker.framerate = lib.properties.fps;
		createjs.Ticker.addEventListener("tick", stage);
	}	    
	//Code to support hidpi screens and responsive scaling.
	AdobeAn.makeResponsive(true,'both',true,1,[canvas,anim_container,dom_overlay_container]);	
	AdobeAn.compositionLoaded(lib.properties.id);
	fnStartAnimation();
	setTimeout(function(){
		if (typeof setupPabloCasaInteractiva === "function") setupPabloCasaInteractiva();
	}, 60);
	setTimeout(function(){
		var startBtn = document.getElementById("start_button");
		var overlay = document.getElementById("start_overlay");
		if (startBtn && overlay) {
			startBtn.addEventListener("pointerdown", function(e){
				if (e.cancelable) e.preventDefault();
				if (typeof window.__startPabloCasaAudio === "function") window.__startPabloCasaAudio();
				createjs.Tween.get(overlay.style).wait(50);
				overlay.style.transition = "opacity 900ms ease";
				overlay.style.opacity = "0";
				setTimeout(function(){ overlay.style.display = "none"; }, 950);
			}, {passive:false});
		}
	}, 120);
}

// --- Interacción Pablo: zoom cinematográfico + audio desbloqueado por toque ---
function setupPabloCasaInteractiva(){
	if (!stage || !exportRoot || !exportRoot.instance) return;
	var cont = exportRoot.instance;
	var canvasEl = document.getElementById("canvas");
	var W = 1080, H = 1920;

	// Capas de luz dentro de contenedor_casa según export de Animate.
	var lights = [
		{mc:cont.instance_3, name:"ventana_1", power:1.25},
		{mc:cont.instance_4, name:"ventana_2", power:1.25},
		{mc:cont.instance_5, name:"puerta", power:1.45},
		{mc:cont.instance_6, name:"atico", power:1.55},
		{mc:cont.instance_7, name:"patio_1", power:1.15},
		{mc:cont.instance_8, name:"patio_2", power:1.15},
		{mc:cont.instance_9, name:"horizonte", power:0.95},
		{mc:cont.instance_10, name:"parque", power:1.20}
	].filter(function(o){ return !!o.mc; });

	lights.forEach(function(o){
		o.mc.alpha = 0;
		o.mc.visible = true;
		o.targetAlpha = 0;
		o.phase = Math.random()*100;
	});

	var baseX = cont.x, baseY = cont.y, baseSX = cont.scaleX, baseSY = cont.scaleY;
	var pointerDown = false;
	var px = W/2, py = H/2;
	var zoomT = 0;          // 0..1 progresivo lineal
	var MAX_ZOOM = 0.36;   // moderado: bastante menos que el anterior
	var ZOOM_MS = 5000;    // 5 segundos ida / vuelta
	var lastTime = createjs.Ticker.getTime();
	var audioStarted = false;
	var ambientSound = null;
	var masterLightEnergy = 0;
	window.__pabloExperienceStarted = false;

	function easeInOut(t){
		// velocidad cero al inicio y al final, acelera en el medio
		return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3)/2;
	}
	function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
	function canvasPoint(evt){
		var rect = canvasEl.getBoundingClientRect();
		var clientX = evt.clientX, clientY = evt.clientY;
		if (evt.touches && evt.touches.length){ clientX = evt.touches[0].clientX; clientY = evt.touches[0].clientY; }
		return { x:(clientX-rect.left)/rect.width*W, y:(clientY-rect.top)/rect.height*H };
	}
	function vibrate(pattern){
		try { if (navigator.vibrate) navigator.vibrate(pattern); } catch(e) {}
	}
	function startAmbientAudio(){
		window.__pabloExperienceStarted = true;
		if (audioStarted) return;
		audioStarted = true;
		try {
			// En móvil, esto debe ejecutarse desde un toque real: botón de inicio o primer pointerdown.
			createjs.Sound.volume = 1;
			ambientSound = createjs.Sound.play("ScreenRecording_05062026180020_1_1", {
				interrupt:createjs.Sound.INTERRUPT_ANY,
				loop:-1,
				volume:0
			});
			if (ambientSound) {
				ambientSound.volume = 0.001;
				createjs.Tween.get(ambientSound, {override:false}).to({volume:0.46}, 2600, createjs.Ease.sineInOut);
			}
		} catch(e) {}
	}
	window.__startPabloCasaAudio = startAmbientAudio;
	function onDown(evt){
		pointerDown = true;
		var p = canvasPoint(evt); px = p.x; py = p.y;
		startAmbientAudio();
		vibrate(18);
		if (evt.cancelable) evt.preventDefault();
	}
	function onMove(evt){
		var p = canvasPoint(evt); px = p.x; py = p.y;
		if (evt.cancelable) evt.preventDefault();
	}
	function onUp(evt){
		pointerDown = false;
		if (evt && evt.cancelable) evt.preventDefault();
	}

	canvasEl.addEventListener("pointerdown", onDown, {passive:false});
	window.addEventListener("pointermove", onMove, {passive:false});
	window.addEventListener("pointerup", onUp, {passive:false});
	canvasEl.addEventListener("touchstart", onDown, {passive:false});
	window.addEventListener("touchmove", onMove, {passive:false});
	window.addEventListener("touchend", onUp, {passive:false});

	function flashLight(o, peak, dur){
		if (!o || !o.mc) return;
		createjs.Tween.removeTweens(o.mc);
		o.mc.alpha = Math.min(peak*0.55, 1.15);
		createjs.Tween.get(o.mc)
			.to({alpha:peak}, dur*0.22, createjs.Ease.quadOut)
			.to({alpha:peak*0.35}, dur*0.22, createjs.Ease.quadInOut)
			.to({alpha:peak*0.95}, dur*0.12, createjs.Ease.quadOut)
			.to({alpha:0}, dur*0.44, createjs.Ease.sineIn);
	}
	function randomHaunt(){
		var r = Math.random();
		var chosen;
		if (r < 0.30) chosen = lights.find(function(o){return o.name==="atico";});
		else if (r < 0.55) chosen = lights.find(function(o){return o.name==="puerta";});
		else chosen = lights[Math.floor(Math.random()*lights.length)];
		flashLight(chosen, chosen ? chosen.power : 1, 500 + Math.random()*1100);
		if (chosen && (chosen.name==="atico" || chosen.name==="puerta") && Math.random()<0.35) vibrate([25,35,55]);
		setTimeout(randomHaunt, 900 + Math.random()*2600);
	}
	setTimeout(randomHaunt, 1200);

	createjs.Ticker.addEventListener("tick", function(){
		var now = createjs.Ticker.getTime();
		var dt = Math.max(0, Math.min(80, now - lastTime));
		lastTime = now;
		zoomT += (pointerDown ? 1 : -1) * dt / ZOOM_MS;
		zoomT = clamp(zoomT, 0, 1);
		var zEase = easeInOut(zoomT);
		var scale = 1 + MAX_ZOOM * zEase;

		// Movimiento más presente: como cabeza/cámara que busca el dedo.
		var nx = (px - W/2) / (W/2);
		var ny = (py - H/2) / (H/2);
		var follow = pointerDown ? 1 : zEase;
		var targetX = baseX + nx * 92 * follow;
		var targetY = baseY + ny * 128 * follow;
		var targetSX = baseSX * scale;
		var targetSY = baseSY * scale;

		// Más brusco en desplazamiento, pero el zoom conserva curva suave.
		cont.x += (targetX - cont.x) * 0.22;
		cont.y += (targetY - cont.y) * 0.22;
		cont.scaleX += (targetSX - cont.scaleX) * 0.055;
		cont.scaleY += (targetSY - cont.scaleY) * 0.055;

		// Bamboleo leve y respiración tenebrosa durante el zoom.
		var t = now/1000;
		cont.rotation = Math.sin(t*1.7)*0.18*zEase + Math.sin(t*4.1)*0.05*(pointerDown?1:0);

		// Si el dedo se acerca a zonas de la casa, levanta luces de forma abusiva pero no constante.
		masterLightEnergy *= 0.93;
		if (pointerDown) masterLightEnergy = Math.max(masterLightEnergy, 0.35 + zEase*0.45);
		lights.forEach(function(o, i){
			if (createjs.Tween.hasActiveTweens && createjs.Tween.hasActiveTweens(o.mc)) return;
			var pulse = (Math.sin(t*(1.5+i*0.31)+o.phase)+1)/2;
			var proximity = pointerDown ? Math.max(0, 1 - Math.abs((i/(lights.length-1))-((px/W))) * 2.2) : 0;
			var targetA = clamp((proximity*0.95 + masterLightEnergy*0.18*pulse) * o.power, 0, 1.15);
			o.mc.alpha += (targetA - o.mc.alpha) * 0.055;
		});

		// Audio: si está sonando, que suba apenas con el toque y baje al soltar.
		if (ambientSound) {
			var targetVol = pointerDown ? 0.52 : 0.36;
			ambientSound.volume += (targetVol - ambientSound.volume) * 0.025;
		}
	});
}

function playSound(id, loop, offset) {
	return createjs.Sound.play(id, {'interrupt':createjs.Sound.INTERRUPT_EARLY, 'loop': loop, 'offset': offset});}
</script>

		</div>
	</div>
