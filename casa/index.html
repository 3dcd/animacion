<style>

    touch-action:none; overscroll-behavior:none; -webkit-user-select:none; user-select:none;

  canvas { touch-action:none; -webkit-touch-callout:none; }

<script>
var canvas, stage, exportRoot, anim_container, dom_overlay_container, fnStartAnimation;
function init() {
	canvas = document.getElementById("canvas");
	anim_container = document.getElementById("animation_container");
	dom_overlay_container = document.getElementById("dom_overlay_container");
	var comp=AdobeAn.getComposition("1214B6B5EC3848A7A25A5618AC420808");
	var lib=comp.getLibrary();
	var loader = new createjs.LoadQueue(false);
	loader.addEventListener("fileload", function(evt){handleFileLoad(evt,comp)});
	loader.addEventListener("complete", function(evt){handleComplete(evt,comp)});
	var lib=comp.getLibrary();
	loader.loadManifest(lib.properties.manifest);
}
function handleFileLoad(evt, comp) {
	var images=comp.getImages();	
	if (evt && (evt.item.type == "image")) { images[evt.item.id] = evt.result; }	
}
function handleComplete(evt,comp) {
	//This function is always called, irrespective of the content. You can use the variable "stage" after it is created in token create_stage.
	var lib=comp.getLibrary();
	var ss=comp.getSpriteSheet();
	var queue = evt.target;
	var ssMetadata = lib.ssMetadata;
	for(i=0; i<ssMetadata.length; i++) {
		ss[ssMetadata[i].name] = new createjs.SpriteSheet( {"images": [queue.getResult(ssMetadata[i].name)], "frames": ssMetadata[i].frames} )
	}
	exportRoot = new lib.casa();
	stage = new lib.Stage(canvas);	
	//Registers the "tick" event listener.
	fnStartAnimation = function() {
		stage.addChild(exportRoot);
		createjs.Ticker.framerate = lib.properties.fps;
		createjs.Ticker.addEventListener("tick", stage);
	}	    
	//Code to support hidpi screens and responsive scaling.
	AdobeAn.makeResponsive(true,'both',true,1,[canvas,anim_container,dom_overlay_container]);	
	AdobeAn.compositionLoaded(lib.properties.id);
	fnStartAnimation();


// --- INTERACCION CASA: versión móvil suave + penumbra poseída ---
(function(){
  const casa = exportRoot.instance;
  if(!casa) return;

  // Activar touch real en CreateJS. Esto ayuda en celular/iPad.
  try { createjs.Touch.enable(stage, true, false); } catch(e) {}
  stage.mouseMoveOutside = true;
  if(canvas){
    canvas.style.touchAction = "none";
    canvas.addEventListener("touchmove", e => e.preventDefault(), {passive:false});
    canvas.addEventListener("touchstart", e => e.preventDefault(), {passive:false});
  }

  const BASE_X = 540, BASE_Y = 671, BASE_S = 0.8749;

  const luces = [
    casa.instance_3,  // puerta / zona baja
    casa.instance_4,  // ventana
    casa.instance_5,  // ventana
    casa.instance_6,  // ático
    casa.instance_7,  // lateral/patio
    casa.instance_8,  // lateral/patio
    casa.instance_9,  // horizonte
    casa.instance_10  // parque/cercana
  ].filter(Boolean);

  luces.forEach(l => {
    createjs.Tween.removeTweens(l);
    l.alpha = 0;
    l.visible = true;
  });

  // Entrada desde negro: evita que se vean todas las luces al cargar.
  const cortinaNegra = new createjs.Shape();
  cortinaNegra.graphics.beginFill("#000000").drawRect(0,0,1080,1920);
  cortinaNegra.alpha = 1;
  exportRoot.addChild(cortinaNegra);
  createjs.Tween.get(cortinaNegra)
    .wait(220)
    .to({alpha:0.34}, 1600, createjs.Ease.quadInOut)
    .to({alpha:0}, 900, createjs.Ease.sineOut)
    .call(()=> exportRoot.removeChild(cortinaNegra));

  let sistemaActivo = false;
  let pointerActivo = false;
  let targetX = BASE_X, targetY = BASE_Y, targetS = BASE_S;
  let targetRot = 0;
  let ultimaReaccion = 0;
  let ultimoFlashDedo = 0;
  let ultimaVibracion = 0;
  let dragZoom = 0;
  let dragZoomTarget = 0;

  setTimeout(()=>{ sistemaActivo = true; randomLuz(); }, 1200);

  function vibrar(patron){
    const ahora = Date.now();
    if(ahora - ultimaVibracion < 650) return;
    ultimaVibracion = ahora;
    if(navigator.vibrate){
      try { navigator.vibrate(patron); } catch(e) {}
    }
  }

  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

  function flash(mc, fuerza=1.25, tiempo=520){
    if(!mc || !sistemaActivo) return;
    createjs.Tween.removeTweens(mc);
    mc.alpha = 0;
    // Más impacto, pero con caída rápida para que no quede prendido como cartel.
    const pico = clamp(fuerza, 0.95, 1.75);
    createjs.Tween.get(mc)
      .to({alpha:pico}, 55, createjs.Ease.quadOut)
      .to({alpha:0.22}, 45)
      .to({alpha:pico*0.92}, 60)
      .wait(70 + Math.random()*160)
      .to({alpha:0}, tiempo, createjs.Ease.quadIn);
  }

  function pulsoLargo(mc){
    if(!mc || !sistemaActivo) return;
    createjs.Tween.removeTweens(mc);
    mc.alpha = 0;
    createjs.Tween.get(mc)
      .to({alpha:1.05 + Math.random()*0.35}, 240, createjs.Ease.sineOut)
      .wait(120 + Math.random()*280)
      .to({alpha:0.55 + Math.random()*0.25}, 360, createjs.Ease.sineInOut)
      .to({alpha:1.25 + Math.random()*0.35}, 90)
      .to({alpha:0}, 900 + Math.random()*850, createjs.Ease.sineIn);
  }

  function randomLuz(){
    if(!sistemaActivo) return;
    const mc = luces[Math.floor(Math.random()*luces.length)];
    if(Math.random() > 0.68) pulsoLargo(mc);
    else flash(mc, 1.05 + Math.random()*0.55, 320 + Math.random()*760);

    // Ecos ocasionales, no constantes, para que en celular no se sienta saturado.
    if(Math.random() > 0.60){
      const extra = luces[Math.floor(Math.random()*luces.length)];
      setTimeout(()=>flash(extra,1.25 + Math.random()*0.35,420), 120+Math.random()*420);
    }
    setTimeout(randomLuz, 620 + Math.random()*1550);
  }

  function normalizar(evt){
    // En CreateJS, stageX/stageY ya vienen bastante normalizados por el stage.
    // Igual los limitamos al tamaño lógico del export.
    const x = clamp(evt.stageX || 540, 0, 1080);
    const y = clamp(evt.stageY || 960, 0, 1920);
    return { nx: (x/1080)-0.5, ny: (y/1920)-0.5 };
  }

  function actualizarObjetivo(evt){
    if(!sistemaActivo) return;
    const ahora = Date.now();
    if(ahora - ultimaReaccion < 28) return; // throttle: menos tosco en celulares
    ultimaReaccion = ahora;

    const p = normalizar(evt);
    const nx = p.nx, ny = p.ny;

    // Movimiento más suave y controlado. Antes hacía Tween por cada move y eso podía sentirse pesado.
    targetX = BASE_X + nx * 34;
    targetY = BASE_Y + ny * 22;
    // Zoom de exploración: mientras arrastrás, la casa se aproxima.
    // No depende de un solo eje; subir/bajar o ir a los costados alimenta la sensación de acercamiento.
    dragZoomTarget = 0.075 + Math.min(0.035, Math.abs(nx)*0.030 + Math.abs(ny)*0.040);
    targetS = BASE_S + dragZoom;
    targetRot = nx * 0.35 + ny * 0.10;

    const distBorde = Math.max(Math.abs(nx), Math.abs(ny));
    const desdeUltimoFlash = ahora - ultimoFlashDedo;
    if(distBorde > 0.32 && desdeUltimoFlash > 620){
      ultimoFlashDedo = ahora;
      if(Math.abs(nx) > Math.abs(ny)){
        flash(casa.instance_7,1.55,420);
        setTimeout(()=>flash(casa.instance_8,1.38,480),90);
      } else if(ny < 0){
        flash(casa.instance_6,1.65,520);
      } else {
        flash(casa.instance_3,1.45,420);
        if(Math.random()>0.55) flash(casa.instance_10,1.25,500);
      }
      if(distBorde > 0.42) vibrar([18,22,48]);
    }
  }

  stage.on("stagemousedown", function(evt){
    pointerActivo = true;
    actualizarObjetivo(evt);
    if(sistemaActivo){
      flash(luces[Math.floor(Math.random()*luces.length)], 1.55, 420);
      vibrar(28);
    }
  });
  stage.on("stagemousemove", actualizarObjetivo);
  stage.on("stagemouseup", function(){
    pointerActivo = false;
    targetX = BASE_X;
    targetY = BASE_Y;
    dragZoomTarget = 0;
    targetS = BASE_S;
    targetRot = 0;
  });

  createjs.Ticker.timingMode = createjs.Ticker.RAF_SYNCHED;
  createjs.Ticker.on("tick", function(){
    if(!sistemaActivo) return;
    const t = Date.now();

    // Lerp de cámara: más fluido que disparar Tweens a cada toque.
    casa.x += (targetX - casa.x) * 0.075;
    casa.y += (targetY - casa.y) * 0.075;
    // Entrada/salida del zoom táctil: entra decidido, vuelve suave.
    dragZoom += (dragZoomTarget - dragZoom) * (pointerActivo ? 0.105 : 0.075);
    targetS = BASE_S + dragZoom;
    casa.scaleX += (targetS - casa.scaleX) * 0.085;
    casa.scaleY += (targetS - casa.scaleY) * 0.085;

    const bamboleo = pointerActivo ? 0.10 : 0.22;
    const rotNatural = Math.sin(t*0.00125)*bamboleo + Math.sin(t*0.0031)*0.05;
    casa.rotation += ((targetRot + rotNatural) - casa.rotation) * 0.065;
  });
})();

}
</script>
