<script>
var canvas, stage, exportRoot, anim_container, dom_overlay_container, fnStartAnimation;
function init() {
	canvas = document.getElementById("canvas");
	anim_container = document.getElementById("animation_container");
	dom_overlay_container = document.getElementById("dom_overlay_container");
	var comp=AdobeAn.getComposition("1214B6B5EC3848A7A25A5618AC420808");
	var lib=comp.getLibrary();
	var loader = new createjs.LoadQueue(false);
	loader.installPlugin(createjs.Sound);
	loader.addEventListener("fileload", function(evt){handleFileLoad(evt,comp)});
	loader.addEventListener("complete", function(evt){handleComplete(evt,comp)});
	var lib=comp.getLibrary();
	loader.loadManifest(lib.properties.manifest);
}
function handleFileLoad(evt, comp) {
	var images=comp.getImages();	
	if (evt && (evt.item.type == "image")) { images[evt.item.id] = evt.result; }	
}
function handleComplete(evt,comp) {
	//This function is always called, irrespective of the content. You can use the variable "stage" after it is created in token create_stage.
	var lib=comp.getLibrary();
	var ss=comp.getSpriteSheet();
	var queue = evt.target;
	var ssMetadata = lib.ssMetadata;
	for(i=0; i<ssMetadata.length; i++) {
		ss[ssMetadata[i].name] = new createjs.SpriteSheet( {"images": [queue.getResult(ssMetadata[i].name)], "frames": ssMetadata[i].frames} )
	}
	exportRoot = new lib.casa();
	stage = new lib.Stage(canvas);	
	//Registers the "tick" event listener.
	fnStartAnimation = function() {
		stage.addChild(exportRoot);
		createjs.Ticker.framerate = lib.properties.fps;
		createjs.Ticker.addEventListener("tick", stage);
	}	    
	//Code to support hidpi screens and responsive scaling.
	AdobeAn.makeResponsive(true,'both',true,1,[canvas,anim_container,dom_overlay_container]);	
	AdobeAn.compositionLoaded(lib.properties.id);
	fnStartAnimation();
	setTimeout(iniciarExperienciaCasa, 80);
}

function playSound(id, loop, offset) {
	return createjs.Sound.play(id, {'interrupt':createjs.Sound.INTERRUPT_EARLY, 'loop': loop, 'offset': offset});}


// --- AJUSTE MOBILE / ZOOM SUAVE / AUDIO AMBIENTE ---
function iniciarExperienciaCasa() {
	if (!exportRoot || exportRoot.__casaMobileInit) return;
	exportRoot.__casaMobileInit = true;

	var root = exportRoot;
	var casa = root.instance; // contenedor_casa exportado por Animate
	if (!casa) return;

	// Evita scroll/gestos del navegador sobre el canvas.
	canvas.style.touchAction = "none";
	document.body.style.overflow = "hidden";
	document.documentElement.style.overflow = "hidden";

	// Nombre conceptual de cada luz según el export.
	var luces = [
		{mc:casa.instance_3, nombre:"ventana_1", base:0.00, max:1.00, tactil:1.25, peso:1.00},
		{mc:casa.instance_4, nombre:"ventana_2", base:0.00, max:1.00, tactil:1.20, peso:0.95},
		{mc:casa.instance_5, nombre:"puerta",    base:0.00, max:1.00, tactil:1.35, peso:1.15},
		{mc:casa.instance_6, nombre:"atico",     base:0.00, max:1.00, tactil:1.40, peso:1.25},
		{mc:casa.instance_7, nombre:"patio_1",   base:0.00, max:0.95, tactil:1.10, peso:0.85},
		{mc:casa.instance_8, nombre:"patio_2",   base:0.00, max:0.95, tactil:1.10, peso:0.85},
		{mc:casa.instance_9, nombre:"horizonte", base:0.00, max:0.75, tactil:0.75, peso:0.55},
		{mc:casa.instance_10,nombre:"parque",    base:0.00, max:0.95, tactil:1.05, peso:0.75}
	].filter(function(o){ return !!o.mc; });

	// Al primer frame, absolutamente todo apagado.
	luces.forEach(function(o){
		o.mc.alpha = 0;
		o.mc.visible = true;
		o.mc.compositeOperation = "screen";
	});

	// Entrada desde penumbra: no muestra todas las luces de golpe.
	var velo = new createjs.Shape();
	velo.graphics.beginFill("#000000").drawRect(0,0,1080,1920);
	velo.alpha = 1;
	root.addChild(velo);
	createjs.Tween.get(velo).wait(200).to({alpha:0.18}, 2600, createjs.Ease.quadOut).wait(700).to({alpha:0}, 2200, createjs.Ease.quadInOut);

	// Ajuste de cámara: zoom medio, lento, 5 segundos ida y 5 vuelta.
	var baseX = casa.x, baseY = casa.y, baseSX = casa.scaleX, baseSY = casa.scaleY;
	var touch = {down:false, x:540, y:960, targetZoom:1, zoom:1, panX:0, panY:0};
	var MAX_ZOOM = 1.42;      // mitad de la versión anterior: se acerca, pero no se descontrola
	var ZOOM_SPEED = 1/300;   // aprox. 5 segundos a 60fps para llegar al máximo
	var PAN_MAX_X = 62;
	var PAN_MAX_Y = 78;

	function vibrar(patron) {
		try { if (navigator.vibrate) navigator.vibrate(patron); } catch(e) {}
	}
	function normalizar(evt) {
		var rect = canvas.getBoundingClientRect();
		var p = evt.touches && evt.touches.length ? evt.touches[0] : evt;
		return {
			x: (p.clientX - rect.left) * (1080 / rect.width),
			y: (p.clientY - rect.top) * (1920 / rect.height)
		};
	}
	function pointerDown(evt) {
		evt.preventDefault();
		var p = normalizar(evt);
		touch.down = true; touch.x = p.x; touch.y = p.y; touch.targetZoom = MAX_ZOOM;
		arrancarAudioAmbiente();
		vibrar(18);
	}
	function pointerMove(evt) {
		if (!touch.down) return;
		evt.preventDefault();
		var p = normalizar(evt);
		touch.x = p.x; touch.y = p.y;
	}
	function pointerUp(evt) {
		touch.down = false;
		touch.targetZoom = 1;
	}
	canvas.addEventListener("pointerdown", pointerDown, {passive:false});
	window.addEventListener("pointermove", pointerMove, {passive:false});
	window.addEventListener("pointerup", pointerUp, {passive:false});
	canvas.addEventListener("touchstart", pointerDown, {passive:false});
	window.addEventListener("touchmove", pointerMove, {passive:false});
	window.addEventListener("touchend", pointerUp, {passive:false});

	// Audio ambiental: fade in, loop con bajada al final y subida al reiniciar.
	var audioAmb = null;
	function arrancarAudioAmbiente() {
		if (audioAmb) return;
		audioAmb = new Audio("sounds/ScreenRecording_05062026180020_1_1.mp3");
		audioAmb.preload = "auto";
		audioAmb.loop = true;
		audioAmb.volume = 0;
		var prom = audioAmb.play();
		if (prom && prom.catch) prom.catch(function(){ /* iOS puede exigir otro toque */ });
		var fadeTimer = setInterval(function(){
			if (!audioAmb || audioAmb.paused) return;
			audioAmb.volume = Math.min(0.42, audioAmb.volume + 0.012);
			if (audioAmb.volume >= 0.42) clearInterval(fadeTimer);
		}, 120);
		audioAmb.addEventListener("timeupdate", function(){
			if (!audioAmb || !isFinite(audioAmb.duration) || audioAmb.duration < 8) return;
			var quedan = audioAmb.duration - audioAmb.currentTime;
			if (quedan < 4) {
				// Se apaga un poco antes de volver a empezar, para que el loop no pegue un salto.
				audioAmb.volume = Math.max(0.16, 0.16 + (quedan/4) * 0.26);
			} else if (audioAmb.currentTime < 5) {
				audioAmb.volume = Math.min(0.42, 0.16 + (audioAmb.currentTime/5) * 0.26);
			} else if (!touch.down) {
				audioAmb.volume += (0.36 - audioAmb.volume) * 0.025;
			} else {
				audioAmb.volume += (0.46 - audioAmb.volume) * 0.025;
			}
		});
	}

	// Luces: comportamiento más natural, con respiración, sustos y reacción táctil.
	function prenderLuz(o, intensidad, subida, duracion, bajada) {
		if (!o || !o.mc) return;
		createjs.Tween.removeTweens(o.mc);
		var pico = Math.min(o.tactil || 1, intensidad * (o.max || 1));
		createjs.Tween.get(o.mc)
			.to({alpha:pico}, subida || 240, createjs.Ease.quadOut)
			.wait(duracion || 500)
			.to({alpha:0}, bajada || 900, createjs.Ease.quadInOut);
	}
	function elegir(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
	function cicloPoseido() {
		var l = elegir(luces);
		var esPrincipal = /ventana|puerta|atico/.test(l.nombre);
		var intensidad = esPrincipal ? (0.85 + Math.random()*0.35) : (0.45 + Math.random()*0.45);
		prenderLuz(l, intensidad, 80 + Math.random()*280, 180 + Math.random()*900, 450 + Math.random()*1200);
		if (Math.random() < 0.28) {
			setTimeout(function(){ prenderLuz(elegir(luces), 0.55 + Math.random()*0.45, 70, 100 + Math.random()*260, 380); }, 120 + Math.random()*460);
		}
		if (Math.random() < 0.18) vibrar([18,40,24]);
		setTimeout(cicloPoseido, 550 + Math.random()*2200);
	}
	setTimeout(cicloPoseido, 2600);

	createjs.Ticker.on("tick", function(){
		// Zoom lento, sostenido mientras se mantiene el dedo.
		var dz = touch.targetZoom - touch.zoom;
		var paso = ZOOM_SPEED;
		if (Math.abs(dz) > paso) touch.zoom += paso * (dz > 0 ? 1 : -1);
		else touch.zoom = touch.targetZoom;

		// El contenedor se mueve en sentido del dedo, como si la casa se acercara a la zona tocada.
		var nx = (touch.x - 540) / 540;
		var ny = (touch.y - 960) / 960;
		var panObjetivoX = touch.down ? nx * PAN_MAX_X : 0;
		var panObjetivoY = touch.down ? ny * PAN_MAX_Y : 0;
		touch.panX += (panObjetivoX - touch.panX) * 0.055;
		touch.panY += (panObjetivoY - touch.panY) * 0.055;

		// Bamboleo mínimo para que no quede muerto.
		var t = createjs.Ticker.getTicks();
		var wobbleX = Math.sin(t*0.018) * 2.2;
		var wobbleY = Math.cos(t*0.014) * 1.5;

		casa.scaleX = baseSX * touch.zoom;
		casa.scaleY = baseSY * touch.zoom;
		casa.x = baseX + touch.panX + wobbleX;
		casa.y = baseY + touch.panY + wobbleY;

		// Cuando el dedo se acerca a sectores de la casa, las luces responden más fuerte.
		if (touch.down) {
			luces.forEach(function(o){
				var b = o.mc.getTransformedBounds && o.mc.getTransformedBounds();
				if (!b) return;
				var cx = b.x + b.width/2, cy = b.y + b.height/2;
				var dx = touch.x - cx, dy = touch.y - cy;
				var dist = Math.sqrt(dx*dx + dy*dy);
				var fuerza = Math.max(0, 1 - dist/430) * (o.peso || 1);
				if (fuerza > 0.04) {
					var objetivo = Math.min(o.tactil || 1, fuerza * 1.15);
					o.mc.alpha += (objetivo - o.mc.alpha) * 0.08;
				}
			});
		}
	});
}
</script>
