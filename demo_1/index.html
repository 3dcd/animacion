var canvas, stage, exportRoot, anim_container, dom_overlay_container, fnStartAnimation;
function init() {
	canvas = document.getElementById("canvas");
	anim_container = document.getElementById("animation_container");
	dom_overlay_container = document.getElementById("dom_overlay_container");
	var comp=AdobeAn.getComposition("39F8F0FF24A14F9AA9E95CAB9BADA657");
	var lib=comp.getLibrary();
	handleComplete({},comp);
}
function handleComplete(evt,comp) {
	//This function is always called, irrespective of the content. You can use the variable "stage" after it is created in token create_stage.
	var lib=comp.getLibrary();
	var ss=comp.getSpriteSheet();
	exportRoot = new lib.logo();
	stage = new lib.Stage(canvas);
	createjs.Touch.enable(stage, true, false);
	stage.enableMouseOver(0);	
	//Registers the "tick" event listener.
	fnStartAnimation = function() {
		stage.addChild(exportRoot);
		createjs.Ticker.framerate = lib.properties.fps;
		createjs.Ticker.addEventListener("tick", stage);
	}	    
	//Code to support hidpi screens and responsive scaling.
	AdobeAn.makeResponsive(true,'both',true,1,[canvas,anim_container,dom_overlay_container]);	
	AdobeAn.compositionLoaded(lib.properties.id);
	fnStartAnimation();
	setupScrubControl(exportRoot, stage);
}
</script>

an.makeResponsive = function(isResp, respDim, isScale, scaleType, domContainers) {		
	var lastW, lastH, lastS=1;		
	window.addEventListener('resize', resizeCanvas);		
	resizeCanvas();		
	function resizeCanvas() {			
		var w = lib.properties.width, h = lib.properties.height;			
		var iw = window.innerWidth, ih=window.innerHeight;			
		var pRatio = window.devicePixelRatio || 1, xRatio=iw/w, yRatio=ih/h, sRatio=1;			
		if(isResp) {                
			if((respDim=='width'&&lastW==iw) || (respDim=='height'&&lastH==ih)) {                    
				sRatio = lastS;                
			}				
			else if(!isScale) {					
				if(iw<w || ih<h)						
					sRatio = Math.min(xRatio, yRatio);				
			}				
			else if(scaleType==1) {					
				sRatio = Math.min(xRatio, yRatio);				
			}				
			else if(scaleType==2) {					
				sRatio = Math.max(xRatio, yRatio);				
			}			
		}
		domContainers[0].width = w * pRatio * sRatio;			
		domContainers[0].height = h * pRatio * sRatio;
		domContainers.forEach(function(container) {				
			container.style.width = w * sRatio + 'px';				
			container.style.height = h * sRatio + 'px';			
		});
		stage.scaleX = pRatio*sRatio;			
		stage.scaleY = pRatio*sRatio;
		lastW = iw; lastH = ih; lastS = sRatio;            
		stage.tickOnUpdate = false;            
		stage.update();            
		stage.tickOnUpdate = true;		
	}

function setupScrubControl(root, stage) {
  var handle = root.instance;
  if (!handle) return;

  var startY = 120.1;
  var endY = 1140.1;
  var totalFrames = Math.max(1, root.totalFrames - 1);

  var currentY = handle.y;
  var dragging = false;
  var dragOffsetY = 0;
  var velocityY = 0;
  var lastStageY = currentY;
  var lastSampleTime = 0;

  // Cola corta: mantiene un poquito del impulso y frena más decidido
  var inertiaFriction = 0.72;
  var minVelocity = 0.10;

  var hit = new createjs.Shape();
  hit.graphics.beginFill("#000").drawRect(-420, -140, 1500, 320);
  handle.hitArea = hit;
  handle.cursor = "pointer";

  function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
  }

  function syncToY(y) {
    currentY = clamp(y, startY, endY);
    var progress = (currentY - startY) / (endY - startY);
    var frame = Math.round(progress * totalFrames);
    root.gotoAndStop(frame);
    stage.update();
  }

  // Arranca en el primer frame y primer estado
  syncToY(startY);

  handle.on("mousedown", function(evt) {
    dragging = true;
    velocityY = 0;
    dragOffsetY = currentY - evt.stageY;
    lastStageY = evt.stageY;
    lastSampleTime = Date.now();
  });

  handle.on("pressmove", function(evt) {
    if (!dragging) return;

    var targetY = evt.stageY + dragOffsetY;
    syncToY(targetY);

    var now = Date.now();
    var dt = Math.max(1, now - lastSampleTime);
    var dy = evt.stageY - lastStageY;

    // Toma la velocidad real del dedo para usarla SOLO al soltar
    velocityY = (dy / dt) * 16.6667;

    lastStageY = evt.stageY;
    lastSampleTime = now;
  });

  function releaseDrag() {
    dragging = false;
  }

  handle.on("pressup", releaseDrag);
  stage.on("stagemouseup", releaseDrag);

  createjs.Ticker.on("tick", function() {
    if (dragging) return;
    if (Math.abs(velocityY) < minVelocity) return;

    var nextY = currentY + velocityY;

    if (nextY <= startY || nextY >= endY) {
      nextY = clamp(nextY, startY, endY);
      velocityY = 0;
    } else {
      velocityY *= inertiaFriction;
    }

    syncToY(nextY);
  });
}
