function loadEmbeddedImages(map) {
  const entries = Object.entries(map);
  return Promise.all(entries.map(([id, src]) => new Promise((resolve, reject) => {
    const image = new Image();
    image.decoding = "async";
    image.onload = () => resolve([id, image]);
    image.onerror = () => reject(new Error("No se pudo cargar la imagen embebida: " + id));
    image.src = src;
  })));
}

function init() {
  canvas = document.getElementById("canvas");
  anim_container = document.getElementById("animation_container");
  dom_overlay_container = document.getElementById("dom_overlay_container");

  var comp = AdobeAn.getComposition("F01EBFB26A534A9398F183D64059C449");
  var lib = comp.getLibrary();
  var images = comp.getImages();

  loadEmbeddedImages(EMBEDDED_IMAGES).then(function(results) {
    results.forEach(function(pair) {
      images[pair[0]] = pair[1];
    });

    exportRoot = new lib.index();
    stage = new lib.Stage(canvas);

    fnStartAnimation = function() {
      stage.addChild(exportRoot);
      createjs.Ticker.framerate = lib.properties.fps;
      createjs.Ticker.addEventListener("tick", stage);
    };

    AdobeAn.makeResponsive(true, 'both', true, 1, [canvas, anim_container, dom_overlay_container]);
    AdobeAn.compositionLoaded(lib.properties.id);
    fnStartAnimation();
  }).catch(function(err) {
    console.error(err);
    document.body.innerHTML = '<div style="font-family:Arial,sans-serif;padding:24px;text-align:center">Error al cargar la animación.</div>';
  });
}
</script>
</head>
<body onload="init();">
  <div id="stage_wrap">
    <div id="animation_container" style="width:1080px;height:1920px">
      <canvas id="canvas" width="1080" height="1920"></canvas>
      <div id="dom_overlay_container" style="width:1080px;height:1920px"></div>
    </div>
  </div>
</body>
