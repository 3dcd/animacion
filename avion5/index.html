<html>
<head>
<meta charset="UTF-8">
<meta name="authoring-tool" content="Adobe_Animate_CC">
<title>avion2</title>
<!-- write your code here -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #ffffff;
  touch-action: none;
  overscroll-behavior: none;
}
#animation_container {
  position: absolute;
  left: 0;
  top: 0;
  transform-origin: 0 0;
}
#canvas {
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
}
</style>
<script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>
<script src="avion2.js"></script>
<script>
var canvas, stage, exportRoot, anim_container, dom_overlay_container, fnStartAnimation;
function init() {
	canvas = document.getElementById("canvas");
	anim_container = document.getElementById("animation_container");
	dom_overlay_container = document.getElementById("dom_overlay_container");
	var comp=AdobeAn.getComposition("9EB062EA1B1A418DB3F8466E5102B28B");
	var lib=comp.getLibrary();
	var loader = new createjs.LoadQueue(false);
	loader.addEventListener("fileload", function(evt){handleFileLoad(evt,comp)});
	loader.addEventListener("complete", function(evt){handleComplete(evt,comp)});
	loader.loadManifest(lib.properties.manifest);
}
function handleFileLoad(evt, comp) {
	var images=comp.getImages();	
	if (evt && (evt.item.type == "image")) { images[evt.item.id] = evt.result; }	
}
function handleComplete(evt,comp) {
	var lib=comp.getLibrary();
	var ss=comp.getSpriteSheet();
	var queue = evt.target;
	var ssMetadata = lib.ssMetadata;
	for(var i=0; i<ssMetadata.length; i++) {
		ss[ssMetadata[i].name] = new createjs.SpriteSheet({"images": [queue.getResult(ssMetadata[i].name)], "frames": ssMetadata[i].frames});
	}
	exportRoot = new lib.avion2();
	stage = new lib.Stage(canvas);	
	fnStartAnimation = function() {
		stage.addChild(exportRoot);
		createjs.Ticker.framerate = lib.properties.fps;
		createjs.Ticker.addEventListener("tick", stage);
		setupAvionInteraction(lib);
	}
	fitToMobileScreen();
	window.addEventListener('resize', fitToMobileScreen);
	window.addEventListener('orientationchange', function(){ setTimeout(fitToMobileScreen, 80); });
	if (window.visualViewport) window.visualViewport.addEventListener('resize', fitToMobileScreen);
	AdobeAn.compositionLoaded(lib.properties.id);
	fnStartAnimation();
}

function fitToMobileScreen() {
	var w = 1080, h = 1920;
	var vw = (window.visualViewport && window.visualViewport.width) ? window.visualViewport.width : window.innerWidth;
	var vh = (window.visualViewport && window.visualViewport.height) ? window.visualViewport.height : window.innerHeight;
	var scale = Math.min(vw / w, vh / h);
	var scaledW = w * scale;
	var scaledH = h * scale;
	anim_container.style.width = w + "px";
	anim_container.style.height = h + "px";
	anim_container.style.left = Math.round((vw - scaledW) / 2) + "px";
	anim_container.style.top = Math.round((vh - scaledH) / 2) + "px";
	anim_container.style.transform = "scale(" + scale + ")";
}

function setupAvionInteraction(lib) {
	if (!stage || !exportRoot || !exportRoot.instance) return;
	createjs.Touch.enable(stage, true, false);
	stage.mouseMoveOutside = true;

	var avion = exportRoot.instance;
	// IMPORTANTE: no se toca la posición original del avión.
	// La timeline raíz queda corriendo para conservar el sube/baja suave.

	var s1 = avion.s_1, s2 = avion.s_2, s3 = avion.s_3;
	var clips = [s1, s2, s3].filter(Boolean);
	// La vuelta del avión está dibujada para 50 posiciones. No usamos el totalFrames automático
	// porque si Animate exporta algún frame extra o estado vacío, puede aparecer un “hueco”.
	var totalFrames = 50;
	for (var i = 0; i < clips.length; i++) {
		clips[i].paused = true;
		clips[i].visible = false;
		clips[i].alpha = 1;
	}

	var frame = 30; // Animate frame 31, CreateJS cuenta desde 0.
	var dragging = false;
	var lastX = 0, startY = 0;
	var vx = 0;
	var sensitivity = 0.075;
	var friction = 0.92;
	var currentLevel = 2;

	function wrapFrame(v) {
		v = v % totalFrames;
		if (v < 0) v += totalFrames;
		return v;
	}

	function showOnly(level) {
		currentLevel = level;
		if (s1) s1.visible = (level === 1);
		if (s2) s2.visible = (level === 2);
		if (s3) s3.visible = (level === 3);
	}

	function patchS2Symbol9(f) {
		// Defensa puntual para el símbolo 9 de S2, por si Animate/CreateJS lo deja _off en ese tramo.
		// En esta timeline aparece en los frames 16/17 de CreateJS, equivalentes a 17/18 en Animate.
		if (!s2 || !s2.instance_18) return;
		if (f === 16 || f === 17) {
			s2.instance_18._off = false;
			s2.instance_18.visible = true;
			s2.instance_18.alpha = 1;
			if (s2.instance_18.gotoAndStop) s2.instance_18.gotoAndStop(0);
		}
	}

	function hasBodyBitmap(mc) {
		// No alcanza con preguntar si hay "algo" visible, porque la hélice es un MovieClip
		// independiente y puede quedar visible aunque el cuerpo del avión haya caído en un hueco.
		// Acá buscamos específicamente algún Bitmap/CachedBmp visible del fuselaje/cuerpo.
		if (!mc || !mc.children) return true;
		for (var i = 0; i < mc.children.length; i++) {
			var ch = mc.children[i];
			if (!ch || ch.visible === false || ch._off === true || ch.alpha === 0) continue;
			if (ch instanceof createjs.Bitmap) return true;
		}
		return false;
	}

	function gotoSafeBodyFrame(mc, f) {
		if (!mc || !mc.gotoAndStop) return f;
		mc.gotoAndStop(f);
		if (hasBodyBitmap(mc)) return f;
		// Si ese frame trae solo la hélice, probamos vecinos cercanos.
		// Mantiene la continuidad visual sin tocar los símbolos internos.
		for (var d = 1; d <= 4; d++) {
			var prev = Math.floor(wrapFrame(f - d));
			mc.gotoAndStop(prev);
			if (hasBodyBitmap(mc)) return prev;
			var next = Math.floor(wrapFrame(f + d));
			mc.gotoAndStop(next);
			if (hasBodyBitmap(mc)) return next;
		}
		mc.gotoAndStop(f);
		return f;
	}

	function applyFrame() {
		var f = Math.floor(wrapFrame(frame));
		for (var i = 0; i < clips.length; i++) {
			var mc = clips[i];
			mc.paused = true;
			mc.alpha = 1;
			gotoSafeBodyFrame(mc, f);
		}
		patchS2Symbol9(f);
		showOnly(currentLevel);
	}

	function applyVertical(dy) {
		// Ascensor vertical: arriba S1, medio S2, abajo S3.
		if (dy < -70) showOnly(1);
		else if (dy > 70) showOnly(3);
		else showOnly(2);
	}

	function pointerDown(evt) {
		dragging = true;
		vx = 0;
		lastX = evt.stageX;
		startY = evt.stageY;
		applyFrame();
	}

	function pointerMove(evt) {
		if (!dragging) return;
		var dx = evt.stageX - lastX;
		var dy = evt.stageY - startY;
		vx = dx * sensitivity;
		frame = wrapFrame(frame + vx);
		lastX = evt.stageX;
		applyVertical(dy);
		applyFrame();
	}

	function pointerUp() { dragging = false; }

	function tick() {
		if (!dragging && Math.abs(vx) > 0.015) {
			frame = wrapFrame(frame + vx);
			vx *= friction;
			applyFrame();
		}
	}

	showOnly(2);
	applyFrame();
	stage.on("stagemousedown", pointerDown);
	stage.on("stagemousemove", pointerMove);
	stage.on("stagemouseup", pointerUp);
	createjs.Ticker.on("tick", tick);
}

</script>

</head>
<body onload="init();" style="margin:0px;">
	<div id="animation_container" style="background-color:rgba(255, 255, 255, 1.00); width:1080px; height:1920px">
		<canvas id="canvas" width="1080" height="1920" style="position: absolute; display: block; background-color:rgba(255, 255, 255, 1.00);"></canvas>
		<div id="dom_overlay_container" style="pointer-events:none; overflow:hidden; width:1080px; height:1920px; position: absolute; left: 0px; top: 0px; display: block;">
		</div>
	</div>
</body>
</html>
