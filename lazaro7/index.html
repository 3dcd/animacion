<script src="lazaro.js"></script>
<script>
var canvas, stage, exportRoot, anim_container, dom_overlay_container, fnStartAnimation;
function init() {
	canvas = document.getElementById("canvas");
	anim_container = document.getElementById("animation_container");
	dom_overlay_container = document.getElementById("dom_overlay_container");
	var comp=AdobeAn.getComposition("5C54AA62E9774C44BCFAA457FFE1B2E1");
	var lib=comp.getLibrary();
	var loader = new createjs.LoadQueue(false);
	loader.addEventListener("fileload", function(evt){handleFileLoad(evt,comp)});
	loader.addEventListener("complete", function(evt){handleComplete(evt,comp)});
	var lib=comp.getLibrary();
	loader.loadManifest(lib.properties.manifest);
}
function handleFileLoad(evt, comp) {
	var images=comp.getImages();	
	if (evt && (evt.item.type == "image")) { images[evt.item.id] = evt.result; }	
}
function handleComplete(evt,comp) {
	//This function is always called, irrespective of the content. You can use the variable "stage" after it is created in token create_stage.
	var lib=comp.getLibrary();
	var ss=comp.getSpriteSheet();
	var queue = evt.target;
	var ssMetadata = lib.ssMetadata;
	for(i=0; i<ssMetadata.length; i++) {
		ss[ssMetadata[i].name] = new createjs.SpriteSheet( {"images": [queue.getResult(ssMetadata[i].name)], "frames": ssMetadata[i].frames} )
	}
	exportRoot = new lib.lazaro();
	window.lockedMobileFit && window.lockedMobileFit();
	stage = new lib.Stage(canvas);	
	//Registers the "tick" event listener.
	fnStartAnimation = function() {
		stage.addChild(exportRoot);
		createjs.Ticker.framerate = lib.properties.fps;
		createjs.Ticker.addEventListener("tick", stage);
	}	    
	//Code to support hidpi screens and responsive scaling.
	window.lockedMobileFit();	
	AdobeAn.compositionLoaded(lib.properties.id);
	fnStartAnimation();
}
</script>

<style>
html, body {
  margin: 0 !important;
  padding: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  height: 100dvh !important;
  overflow: hidden !important;
  background: #000 !important;

  inset: 0 !important;
  overscroll-behavior: none !important;
  touch-action: none !important;
  -ms-touch-action: none !important;
  -webkit-user-select: none !important;
  user-select: none !important;
}

#animation_container {
  position: absolute !important;
  width: 1080px !important;

  left: 0 !important;
  top: 0 !important;
  overflow: hidden !important;
  transform-origin: 0 0 !important;
  will-change: transform;
  backface-visibility: hidden;
}

#canvas {
  position: absolute !important;
  left: 0 !important;
  top: 0 !important;
  width: 1080px !important;
  height: 1920px !important;
  display: block !important;
  touch-action: none !important;
}

#dom_overlay_container {
  position: absolute !important;
  left: 0 !important;
  top: 0 !important;
  width: 1080px !important;
  height: 1920px !important;
  overflow: hidden !important;
  pointer-events: none !important;
  touch-action: none !important;
}
</style>

<script>
(function() {
  var STAGE_W = 1080;
  var STAGE_H = 1920;

  function getVH() {
    if (window.visualViewport && window.visualViewport.height) return window.visualViewport.height;
    return window.innerHeight || document.documentElement.clientHeight || STAGE_H;
  }

  function getVW() {
    if (window.visualViewport && window.visualViewport.width) return window.visualViewport.width;
    return window.innerWidth || document.documentElement.clientWidth || STAGE_W;
  }

  window.lockedMobileFit = function() {
    var container = document.getElementById("animation_container");
    var canvas = document.getElementById("canvas");
    var overlay = document.getElementById("dom_overlay_container");
    if (!container || !canvas) return;

    var vw = getVW();
    var vh = getVH();

    var scale = Math.min(vw / STAGE_W, vh / STAGE_H);
    var x = Math.round((vw - STAGE_W * scale) / 2);
    var y = Math.round((vh - STAGE_H * scale) / 2);

    document.documentElement.style.overflow = "hidden";
    document.body.style.overflow = "hidden";
    document.body.style.position = "fixed";
    document.body.style.inset = "0";
    document.body.style.width = "100vw";
    document.body.style.height = "100dvh";

    container.style.width = STAGE_W + "px";
    container.style.height = STAGE_H + "px";
    container.style.transformOrigin = "0 0";
    container.style.transform = "translate3d(" + x + "px," + y + "px,0) scale(" + scale + ")";

    canvas.width = STAGE_W;
    canvas.height = STAGE_H;
    canvas.style.width = STAGE_W + "px";
    canvas.style.height = STAGE_H + "px";

    if (overlay) {
      overlay.style.width = STAGE_W + "px";
      overlay.style.height = STAGE_H + "px";
    }
  };

  function blockZoom(e) {
    if (e.cancelable) e.preventDefault();
    return false;
  }

  // Bloqueo fuerte del pellizco/zoom.
  document.addEventListener("gesturestart", blockZoom, { passive:false });
  document.addEventListener("gesturechange", blockZoom, { passive:false });
  document.addEventListener("gestureend", blockZoom, { passive:false });

  document.addEventListener("touchstart", function(e) {
    if (e.touches && e.touches.length > 1 && e.cancelable) e.preventDefault();
  }, { passive:false });

  document.addEventListener("touchmove", function(e) {
    if (e.touches && e.touches.length > 1 && e.cancelable) e.preventDefault();
  }, { passive:false });

  // Bloquea doble tap zoom en algunos navegadores.
  var lastTouchEnd = 0;
  document.addEventListener("touchend", function(e) {
    var now = Date.now();
    if (now - lastTouchEnd <= 300 && e.cancelable) e.preventDefault();
    lastTouchEnd = now;
  }, { passive:false });

  window.addEventListener("resize", function() { setTimeout(window.lockedMobileFit, 60); });
  window.addEventListener("orientationchange", function() { setTimeout(window.lockedMobileFit, 300); });
  if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", function() { setTimeout(window.lockedMobileFit, 60); });
    window.visualViewport.addEventListener("scroll", function() { setTimeout(window.lockedMobileFit, 60); });
  }

  window.addEventListener("load", function() {
    setTimeout(window.lockedMobileFit, 50);
    setTimeout(window.lockedMobileFit, 500);
    setTimeout(window.lockedMobileFit, 1200);
  });
})();
</script>

</head>
<body onload="init();" style="margin:0;padding:0;overflow:hidden;background:#000;width:100vw;height:100vh;position:fixed;inset:0;touch-action:none;">
	<div id="animation_container" style="background-color:rgba(255, 255, 255, 1.00); width:1080px; height:1920px">
		<canvas id="canvas" width="1080" height="1920" style="position: absolute; display: block; background-color:rgba(255, 255, 255, 1.00);"></canvas>
		<div id="dom_overlay_container" style="pointer-events:none; overflow:hidden; width:1080px; height:1920px; position: absolute; left: 0px; top: 0px; display: block;">
		</div>
	</div>
</body>
