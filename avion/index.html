<script>
var canvas, stage, exportRoot, anim_container, dom_overlay_container, fnStartAnimation;
function init() {
	canvas = document.getElementById("canvas");
	anim_container = document.getElementById("animation_container");
	dom_overlay_container = document.getElementById("dom_overlay_container");
	var comp=AdobeAn.getComposition("9EB062EA1B1A418DB3F8466E5102B28B");
	var lib=comp.getLibrary();
	var loader = new createjs.LoadQueue(false);
	loader.addEventListener("fileload", function(evt){handleFileLoad(evt,comp)});
	loader.addEventListener("complete", function(evt){handleComplete(evt,comp)});
	var lib=comp.getLibrary();
	loader.loadManifest(lib.properties.manifest);
}
function handleFileLoad(evt, comp) {
	var images=comp.getImages();	
	if (evt && (evt.item.type == "image")) { images[evt.item.id] = evt.result; }	
}
function handleComplete(evt,comp) {
	//This function is always called, irrespective of the content. You can use the variable "stage" after it is created in token create_stage.
	var lib=comp.getLibrary();
	var ss=comp.getSpriteSheet();
	var queue = evt.target;
	var ssMetadata = lib.ssMetadata;
	for(i=0; i<ssMetadata.length; i++) {
		ss[ssMetadata[i].name] = new createjs.SpriteSheet( {"images": [queue.getResult(ssMetadata[i].name)], "frames": ssMetadata[i].frames} )
	}
	exportRoot = new lib.avion();
	stage = new lib.Stage(canvas);	
	//Registers the "tick" event listener.
	fnStartAnimation = function() {
		stage.addChild(exportRoot);
		createjs.Touch.enable(stage, true, false);
		stage.enableMouseOver(10);
		createjs.Ticker.framerate = lib.properties.fps;
		createjs.Ticker.addEventListener("tick", stage);
		setupAvionTouchController();
	}	    
	//Code to support hidpi screens and responsive scaling.
	AdobeAn.makeResponsive(true,'both',true,1,[canvas,anim_container,dom_overlay_container]);	
	AdobeAn.compositionLoaded(lib.properties.id);
	fnStartAnimation();
}
</script>

<script>
/*
Control interactivo agregado:
- Respeta tu animación interna, incluida la hélice.
- El MovieClip interno del avión entra y frena suave en el frame 31.
- Luego el dedo arrastra horizontalmente para girar.
- Al soltar, queda envión con fricción suave.
- El stage general puede seguir con su movimiento de subida/bajada.
*/
function setupAvionTouchController(){
    if(!exportRoot || !exportRoot.instance || !stage){ return; }

    var avion = exportRoot.instance; // MovieClip interno con las vistas del avión.
    var totalFrames = Math.max(1, avion.totalFrames || 50);
    var stopFrame = 30; // Frame 31 visual de Animate, CreateJS cuenta desde 0.
    var frameFloat = 0;
    var velocity = 1.15;
    var isDragging = false;
    var lastX = 0;
    var lastTime = Date.now();
    var phase = "intro";

    // Frenamos solo el MC de vistas del avión, no la hélice interna ni el stage general.
    avion.stop();
    avion.gotoAndStop(0);

    function wrapFrame(v){
        v = v % totalFrames;
        if(v < 0){ v += totalFrames; }
        return v;
    }

    function gotoFloatFrame(v){
        frameFloat = wrapFrame(v);
        avion.gotoAndStop(Math.round(frameFloat) % totalFrames);
    }

    function tickControl(){
        if(phase === "intro"){
            var remaining = stopFrame - frameFloat;

            if(remaining <= 0.12){
                frameFloat = stopFrame;
                velocity = 0;
                phase = "ready";
                avion.gotoAndStop(stopFrame);
                return;
            }

            // Avanza y se frena suavemente cerca del frame 31.
            var step = Math.max(0.10, Math.min(1.25, remaining * 0.16));
            frameFloat += step;
            avion.gotoAndStop(Math.round(frameFloat));
            return;
        }

        if(!isDragging){
            if(Math.abs(velocity) > 0.015){
                gotoFloatFrame(frameFloat + velocity);
                velocity *= 0.955;
            }else{
                velocity = 0;
            }
        }
    }

    createjs.Ticker.addEventListener("tick", tickControl);

    stage.on("stagemousedown", function(evt){
        phase = "manual";
        isDragging = true;
        lastX = evt.stageX;
        lastTime = Date.now();
        velocity = 0;
    });

    stage.on("stagemousemove", function(evt){
        if(!isDragging){ return; }

        var now = Date.now();
        var dx = evt.stageX - lastX;
        var dt = Math.max(16, now - lastTime);

        var dragStep = dx * 0.075;
        gotoFloatFrame(frameFloat + dragStep);

        velocity = dragStep * (16 / dt) * 1.35;

        lastX = evt.stageX;
        lastTime = now;
    });

    stage.on("stagemouseup", function(){
        isDragging = false;

        if(velocity > 4.5){ velocity = 4.5; }
        if(velocity < -4.5){ velocity = -4.5; }
    });
}
</script>
