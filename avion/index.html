<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="authoring-tool" content="Adobe_Animate_CC">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>abion</title>

<script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>
<script src="abion.js"></script>

<style>
html, body {
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#ffffff;
    touch-action:none;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

#animation_container{
    position:relative;
    width:1080px;
    height:1920px;
    overflow:hidden;
    background:#ffffff;
}

canvas{
    position:absolute;
    display:block;
    background:#ffffff;
}

#dom_overlay_container{
    pointer-events:none;
    overflow:hidden;
    position:absolute;
    left:0;
    top:0;
}

</style>

<script>
var canvas, stage, exportRoot, anim_container, dom_overlay_container, fnStartAnimation;

function init() {

    canvas = document.getElementById("canvas");
    anim_container = document.getElementById("animation_container");
    dom_overlay_container = document.getElementById("dom_overlay_container");

    var comp = AdobeAn.getComposition("9EB062EA1B1A418DB3F8466E5102B28B");
    var lib = comp.getLibrary();

    var loader = new createjs.LoadQueue(false);

    loader.addEventListener("fileload", function(evt){
        handleFileLoad(evt, comp);
    });

    loader.addEventListener("complete", function(evt){
        handleComplete(evt, comp);
    });

    loader.loadManifest(lib.properties.manifest);
}

function handleFileLoad(evt, comp) {
    var images = comp.getImages();

    if (evt && (evt.item.type == "image")) {
        images[evt.item.id] = evt.result;
    }
}

function handleComplete(evt, comp) {

    var lib = comp.getLibrary();
    var ss = comp.getSpriteSheet();
    var queue = evt.target;
    var ssMetadata = lib.ssMetadata;

    for(var i = 0; i < ssMetadata.length; i++) {
        ss[ssMetadata[i].name] = new createjs.SpriteSheet({
            "images": [queue.getResult(ssMetadata[i].name)],
            "frames": ssMetadata[i].frames
        });
    }

    exportRoot = new lib.abion();

    stage = new lib.Stage(canvas);

    fnStartAnimation = function() {
        stage.addChild(exportRoot);

        createjs.Touch.enable(stage);

        stage.enableMouseOver(10);

        createjs.Ticker.framerate = lib.properties.fps;
        createjs.Ticker.addEventListener("tick", stage);
    }

    makeResponsiveCanvas();

    window.addEventListener('resize', makeResponsiveCanvas);

    AdobeAn.compositionLoaded(lib.properties.id);

    fnStartAnimation();
}

function makeResponsiveCanvas(){

    var w = 1080;
    var h = 1920;

    var iw = window.innerWidth;
    var ih = window.innerHeight;

    var scale = Math.min(iw / w, ih / h);

    var cw = w * scale;
    var ch = h * scale;

    anim_container.style.width = cw + "px";
    anim_container.style.height = ch + "px";

    canvas.width = w;
    canvas.height = h;

    canvas.style.width = cw + "px";
    canvas.style.height = ch + "px";

    dom_overlay_container.style.width = cw + "px";
    dom_overlay_container.style.height = ch + "px";

    stage.scaleX = scale;
    stage.scaleY = scale;

    stage.update();
}
</script>

</head>

<body onload="init();">

<div id="animation_container">

    <canvas id="canvas" width="1080" height="1920"></canvas>

    <div id="dom_overlay_container"></div>

</div>

</body>
</html>
