<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="authoring-tool" content="Adobe_Animate_CC">
<title>logo_3d</title>
<!-- write your code here -->
<style>
  html, body {
	margin: 0;
	width: 100%;
	height: 100%;
	overflow: hidden;
	background: #999999;
	touch-action: none;
	-webkit-user-select: none;
	user-select: none;
  }
  #animation_container {
	position:absolute;
	margin:auto;
	left:0;right:0;
	top:0;bottom:0;
	touch-action: none;
  }
  #canvas {
	touch-action: none;
	-webkit-user-select: none;
	user-select: none;
  }
</style>
<script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>
<script src="logo_3d.js"></script>
<script>
var canvas, stage, exportRoot, anim_container, dom_overlay_container, fnStartAnimation;
function init() {
	canvas = document.getElementById("canvas");
	anim_container = document.getElementById("animation_container");
	dom_overlay_container = document.getElementById("dom_overlay_container");
	var comp=AdobeAn.getComposition("A510BAF3819644AAB7E7C073F5500161");
	var lib=comp.getLibrary();
	handleComplete({},comp);
}
function handleComplete(evt,comp) {
	//This function is always called, irrespective of the content. You can use the variable "stage" after it is created in token create_stage.
	var lib=comp.getLibrary();
	var ss=comp.getSpriteSheet();
	exportRoot = new lib.logo_3d();
	stage = new lib.Stage(canvas);	
	//Registers the "tick" event listener.
	fnStartAnimation = function() {
		stage.addChild(exportRoot);
		setupFichaSpinControl(lib);
		createjs.Ticker.framerate = lib.properties.fps;
		createjs.Ticker.timingMode = createjs.Ticker.RAF_SYNCHED;
		createjs.Ticker.addEventListener("tick", stage);
	}	    
	//Code to support hidpi screens and responsive scaling.
	AdobeAn.makeResponsive(true,'both',true,1,[canvas,anim_container,dom_overlay_container]);	
	AdobeAn.compositionLoaded(lib.properties.id);
	fnStartAnimation();
}

function setupFichaSpinControl(lib) {
	// Control táctil tipo “rueda física” sobre la línea de tiempo exportada desde Animate.
	// No reconstruye la animación: solo mueve el frame actual con inercia.
	var totalFrames = exportRoot.totalFrames || 48;
	var startFrame = Math.min(24, totalFrames - 1); // frame del stop central creado en Animate
	var framePosition = startFrame;
	var velocity = 0;
	var dragging = false;
	var lastX = 0;
	var lastTime = 0;
	var pxToFrames = 0.085; // sensibilidad: subir si querés que gire con menos recorrido de dedo
	var friction = 0.955;   // frenada suave: más cerca de 1 = gira más tiempo
	var maxVelocity = 7.5;

	exportRoot.stop();
	exportRoot.gotoAndStop(startFrame);
	canvas.style.touchAction = "none";

	function clamp(v, min, max) {
		return Math.max(min, Math.min(max, v));
	}

	function normalizedFrame(pos) {
		var f = Math.round(pos) % totalFrames;
		return f < 0 ? f + totalFrames : f;
	}

	function renderFrame() {
		exportRoot.gotoAndStop(normalizedFrame(framePosition));
	}

	function getClientX(evt) {
		if (evt.touches && evt.touches.length) return evt.touches[0].clientX;
		if (evt.changedTouches && evt.changedTouches.length) return evt.changedTouches[0].clientX;
		return evt.clientX;
	}

	function startDrag(evt) {
		evt.preventDefault();
		dragging = true;
		velocity = 0;
		lastX = getClientX(evt);
		lastTime = performance.now();
	}

	function moveDrag(evt) {
		if (!dragging) return;
		evt.preventDefault();
		var now = performance.now();
		var x = getClientX(evt);
		var dx = x - lastX;
		var dt = Math.max(8, now - lastTime);
		var deltaFrames = dx * pxToFrames;
		framePosition += deltaFrames;
		velocity = clamp((deltaFrames / dt) * 16.6667, -maxVelocity, maxVelocity);
		lastX = x;
		lastTime = now;
		renderFrame();
	}

	function endDrag(evt) {
		if (!dragging) return;
		evt.preventDefault();
		dragging = false;
	}

	canvas.addEventListener("pointerdown", startDrag, { passive: false });
	window.addEventListener("pointermove", moveDrag, { passive: false });
	window.addEventListener("pointerup", endDrag, { passive: false });
	window.addEventListener("pointercancel", endDrag, { passive: false });
	canvas.addEventListener("touchstart", startDrag, { passive: false });
	window.addEventListener("touchmove", moveDrag, { passive: false });
	window.addEventListener("touchend", endDrag, { passive: false });
	window.addEventListener("touchcancel", endDrag, { passive: false });

	createjs.Ticker.addEventListener("tick", function () {
		if (dragging) return;
		if (Math.abs(velocity) > 0.01) {
			framePosition += velocity;
			velocity *= friction;
			renderFrame();
		} else {
			velocity = 0;
		}
	});
}

</script>

</head>
<body onload="init();" style="margin:0px;">
	<div id="animation_container" style="background-color:rgba(153, 153, 153, 1.00); width:1080px; height:1920px">
		<canvas id="canvas" width="1080" height="1920" style="position: absolute; display: block; background-color:rgba(153, 153, 153, 1.00);"></canvas>
		<div id="dom_overlay_container" style="pointer-events:none; overflow:hidden; width:1080px; height:1920px; position: absolute; left: 0px; top: 0px; display: block;">
		</div>
	</div>
</body>
</html>
