<html>
<head>
<meta charset="UTF-8">
<meta name="authoring-tool" content="Adobe_Animate_CC">
<title>logo_3d</title>
<!-- write your code here -->
<style>
  html, body {
	margin:0;
	width:100%;
	height:100%;
	overflow:hidden;
	background:#999999;
	ouch-action:none;
	-webkit-user-select:none;
	user-select:none;
  }
  #canvas {
	touch-action:none;
	-webkit-user-select:none;
	user-select:none;
  }
  #animation_container {
	position:absolute;
	margin:auto;
	left:0;right:0;
	top:0;bottom:0;
  }
</style>
<script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>
<script src="logo_3d.js"></script>
<script>
var canvas, stage, exportRoot, anim_container, dom_overlay_container, fnStartAnimation;
function init() {
	canvas = document.getElementById("canvas");
	anim_container = document.getElementById("animation_container");
	dom_overlay_container = document.getElementById("dom_overlay_container");
	var comp=AdobeAn.getComposition("A510BAF3819644AAB7E7C073F5500161");
	var lib=comp.getLibrary();
	handleComplete({},comp);
}
function handleComplete(evt,comp) {
	//This function is always called, irrespective of the content. You can use the variable "stage" after it is created in token create_stage.
	var lib=comp.getLibrary();
	var ss=comp.getSpriteSheet();
	exportRoot = new lib.logo_3d();
	stage = new lib.Stage(canvas);	
	//Registers the "tick" event listener.
	fnStartAnimation = function() {
		stage.addChild(exportRoot);
		createjs.Ticker.framerate = lib.properties.fps;
		createjs.Ticker.timingMode = createjs.Ticker.RAF_SYNCHED;
		createjs.Ticker.addEventListener("tick", stage);
		instalarGiroFichaTouch();
	}	    
	//Code to support hidpi screens and responsive scaling.
	AdobeAn.makeResponsive(true,'both',true,1,[canvas,anim_container,dom_overlay_container]);	
	AdobeAn.compositionLoaded(lib.properties.id);
	fnStartAnimation();
}


// Interacción física para ficha 3D exportada frame por frame.
// Pensada para móvil: interpreta mejor el gesto del dedo que el mouse.
function instalarGiroFichaTouch() {
	var totalFrames = 48;
	var frameCentral = 24; // frame 25 visual de Animate
	var pasoVisual = 2;    // esta versión tiene una placa cada 2 frames
	var posFrame = frameCentral;
	var velocidad = 0;
	var arrastrando = false;
	var ultimoX = 0;
	var ultimoT = 0;
	var historial = [];
	var tipoEntrada = "mouse";

	function mod(n, m) { return ((n % m) + m) % m; }
	function clamp(n, a, b) { return Math.max(a, Math.min(b, n)); }

	function pintar() {
		// Se mantiene el escalonado original cada 2 frames, pero se corta rápido
		// cuando la velocidad ya no aporta giro visible.
		var f = Math.round(posFrame / pasoVisual) * pasoVisual;
		f = mod(f, totalFrames);
		exportRoot.gotoAndStop(f);
	}

	function registrarMovimiento(x, t) {
		historial.push({x:x, t:t});
		while (historial.length > 6) historial.shift();
	}

	function velocidadFlick() {
		if (historial.length < 2) return 0;
		var ahora = historial[historial.length - 1];
		var mejor = historial[0];
		for (var i = historial.length - 2; i >= 0; i--) {
			if (ahora.t - historial[i].t >= 45) { mejor = historial[i]; break; }
		}
		var dt = Math.max(16, ahora.t - mejor.t);
		return (ahora.x - mejor.x) / dt; // px/ms
	}

	function bajarEvento(e) {
		arrastrando = true;
		tipoEntrada = (e.pointerType || "mouse");
		ultimoX = e.clientX;
		ultimoT = performance.now();
		historial = [];
		registrarMovimiento(ultimoX, ultimoT);
		velocidad = 0;
		if (canvas.setPointerCapture && e.pointerId != null) canvas.setPointerCapture(e.pointerId);
		e.preventDefault();
	}

	function moverEvento(e) {
		if (!arrastrando) return;
		var t = performance.now();
		var x = e.clientX;
		var dx = x - ultimoX;
		var dt = Math.max(8, t - ultimoT);

		// En touch se necesita más sensibilidad: el dedo suele dar menos recorrido
		// que el mouse y el sistema suaviza eventos.
		var gananciaArrastre = (tipoEntrada === "touch" || tipoEntrada === "pen") ? 0.082 : 0.060;
		posFrame += dx * gananciaArrastre;
		velocidad = (dx / dt) * gananciaArrastre * 16.67;

		ultimoX = x;
		ultimoT = t;
		registrarMovimiento(x, t);
		pintar();
		e.preventDefault();
	}

	function subirEvento(e) {
		if (!arrastrando) return;
		arrastrando = false;

		var vPx = velocidadFlick();
		var multiplicadorFlick = (tipoEntrada === "touch" || tipoEntrada === "pen") ? 3.80 : 2.20;
		velocidad = clamp(vPx * multiplicadorFlick, -5.6, 5.6);

		// Si apenas tocó sin barrer, no dejamos vibrar la ficha.
		if (Math.abs(velocidad) < 0.11) velocidad = 0;
		if (canvas.releasePointerCapture && e.pointerId != null) {
			try { canvas.releasePointerCapture(e.pointerId); } catch(err) {}
		}
		e.preventDefault();
	}

	canvas.addEventListener("pointerdown", bajarEvento, {passive:false});
	canvas.addEventListener("pointermove", moverEvento, {passive:false});
	canvas.addEventListener("pointerup", subirEvento, {passive:false});
	canvas.addEventListener("pointercancel", subirEvento, {passive:false});
	canvas.addEventListener("lostpointercapture", function(){ arrastrando = false; }, {passive:false});

	// Fallback para iOS viejo si no entrega pointer events completos.
	canvas.addEventListener("touchstart", function(e){ if(e.touches[0]) bajarEvento({clientX:e.touches[0].clientX, pointerType:"touch", preventDefault:function(){e.preventDefault();}}); }, {passive:false});
	canvas.addEventListener("touchmove", function(e){ if(e.touches[0]) moverEvento({clientX:e.touches[0].clientX, pointerType:"touch", preventDefault:function(){e.preventDefault();}}); }, {passive:false});
	canvas.addEventListener("touchend", function(e){ subirEvento({clientX:ultimoX, pointerType:"touch", preventDefault:function(){e.preventDefault();}}); }, {passive:false});

	createjs.Ticker.addEventListener("tick", function() {
		if (arrastrando) return;
		if (Math.abs(velocidad) > 0.001) {
			posFrame += velocidad;
			pintar();

			// Frenada corta: se siente inercia, pero no queda tac-tac-tac largo al final.
			var friccion = (tipoEntrada === "touch" || tipoEntrada === "pen") ? 0.875 : 0.895;
			velocidad *= friccion;

			if (Math.abs(velocidad) < 0.075) {
				velocidad = 0;
				posFrame = Math.round(posFrame / pasoVisual) * pasoVisual;
				pintar();
			}
		}
	});

	pintar();
}

</script>

</head>
<body onload="init();" style="margin:0px;">
	<div id="animation_container" style="background-color:rgba(153, 153, 153, 1.00); width:1080px; height:1920px">
		<canvas id="canvas" width="1080" height="1920" style="position: absolute; display: block; background-color:rgba(153, 153, 153, 1.00);"></canvas>
		<div id="dom_overlay_container" style="pointer-events:none; overflow:hidden; width:1080px; height:1920px; position: absolute; left: 0px; top: 0px; display: block;">
		</div>
	</div>
</body>
</html>
