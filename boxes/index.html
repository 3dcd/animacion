function preloadEmbeddedImages(map) {
  const entries = Object.entries(map);
  return Promise.all(entries.map(([id, src]) => new Promise((resolve, reject) => {
    const im = new Image();
    im.onload = () => resolve([id, im]);
    im.onerror = () => reject(new Error("No se pudo cargar la imagen embebida: " + id));
    im.src = src;
  })));
}
