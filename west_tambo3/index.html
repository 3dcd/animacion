<script>
var canvas, stage, exportRoot, anim_container, dom_overlay_container, fnStartAnimation;
function init() {
	canvas = document.getElementById("canvas");
	anim_container = document.getElementById("animation_container");
	dom_overlay_container = document.getElementById("dom_overlay_container");
	var comp=AdobeAn.getComposition("056D7DD7403046F3A38011080527CFDA");
	var lib=comp.getLibrary();
	var loader = new createjs.LoadQueue(false);
	loader.addEventListener("fileload", function(evt){handleFileLoad(evt,comp)});
	loader.addEventListener("complete", function(evt){handleComplete(evt,comp)});
	var lib=comp.getLibrary();
	loader.loadManifest(lib.properties.manifest);
}
function handleFileLoad(evt, comp) {
	var images=comp.getImages();	
	if (evt && (evt.item.type == "image")) { images[evt.item.id] = evt.result; }	
}
function handleComplete(evt,comp) {
	//This function is always called, irrespective of the content. You can use the variable "stage" after it is created in token create_stage.
	var lib=comp.getLibrary();
	var ss=comp.getSpriteSheet();
	var queue = evt.target;
	var ssMetadata = lib.ssMetadata;
	for(i=0; i<ssMetadata.length; i++) {
		ss[ssMetadata[i].name] = new createjs.SpriteSheet( {"images": [queue.getResult(ssMetadata[i].name)], "frames": ssMetadata[i].frames} )
	}
	exportRoot = new lib.west_tambo3();
	stage = new lib.Stage(canvas);
	stage.enableMouseOver();	
	//Registers the "tick" event listener.
	fnStartAnimation = function() {
		stage.addChild(exportRoot);
		createjs.Ticker.framerate = lib.properties.fps;
		createjs.Ticker.addEventListener("tick", stage);
	}	    
	//Code to support hidpi screens and responsive scaling.
	window.lockedMobileFit();	
	AdobeAn.compositionLoaded(lib.properties.id);
	fnStartAnimation();
	window.lockedMobileFit && window.lockedMobileFit();
	setTimeout(function(){ if(window.setupWestTamboDrags && exportRoot && stage){ window.setupWestTamboDrags(exportRoot, stage); } }, 250);
}
</script>

<script>
(function(){
  const SW=1080;
  const SH=1920;

  function fit(){
    const c=document.getElementById('animation_container');
    if(!c) return;

    const vw=window.innerWidth || document.documentElement.clientWidth || SW;
    const vh=window.innerHeight || document.documentElement.clientHeight || SH;
    const scale=Math.min(vw/SW, vh/SH);
    const x=(vw-(SW*scale))/2;
    const y=(vh-(SH*scale))/2;

    c.style.transform='translate3d('+x+'px,'+y+'px,0) scale('+scale+')';
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        c.classList.add('ready');
      });
    });
  }

  function block(e){
    if(e.cancelable) e.preventDefault();
    return false;
  }

  document.addEventListener('gesturestart', block, {passive:false});
  document.addEventListener('gesturechange', block, {passive:false});
  document.addEventListener('gestureend', block, {passive:false});

  document.addEventListener('touchstart', function(e){
    if(e.touches && e.touches.length>1 && e.cancelable) e.preventDefault();
  }, {passive:false});

  document.addEventListener('touchmove', function(e){
    if(e.touches && e.touches.length>1 && e.cancelable) e.preventDefault();
  }, {passive:false});

  let lastTouchEnd=0;
  document.addEventListener('touchend', function(e){
    const now=Date.now();
    if(now-lastTouchEnd<=300 && e.cancelable) e.preventDefault();
    lastTouchEnd=now;
  }, {passive:false});

  window.addEventListener('resize', function(){ setTimeout(fit,80); });
  window.addEventListener('orientationchange', function(){ setTimeout(fit,300); });
  window.addEventListener('load', function(){
    setTimeout(fit,80);
    setTimeout(fit,500);
  });

  window.lockedMobileFit=fit;

  window.setupWestTamboDrags=function(root, stage){
    if(!root || !stage || root.__westTamboDragReady) return;

    const config=[
      {name:'button_1', label:'n1'},
      {name:'button_2', label:'n2'},
      {name:'button_3', label:'n3'},
      {name:'button_4', label:'n4'}
    ];

    function setupOne(mc, label){
      if(!mc || mc.__softDragReady) return;
      mc.__softDragReady=true;
      mc.mouseEnabled=true;
      mc.cursor='pointer';

      let homeX=mc.x, homeY=mc.y;
      let vx=0, vy=0;
      let dragging=false;
      let returning=false;
      let offsetX=0, offsetY=0;
      let lastX=0, lastY=0, lastT=0;
      let moved=false;

      mc.on('mousedown', function(evt){
        if(root.paused===false && root.currentFrame < 205) return;

        homeX=mc.x;
        homeY=mc.y;
        dragging=true;
        returning=false;
        moved=false;
        vx=0; vy=0;

        if(mc.parent) mc.parent.addChild(mc);

        const pt=mc.parent.globalToLocal(evt.stageX, evt.stageY);
        offsetX=mc.x-pt.x;
        offsetY=mc.y-pt.y;
        lastX=pt.x;
        lastY=pt.y;
        lastT=Date.now();
      });

      mc.on('pressmove', function(evt){
        if(!dragging || !mc.parent) return;

        const pt=mc.parent.globalToLocal(evt.stageX, evt.stageY);
        const now=Date.now();
        const dt=Math.max(16, now-lastT);

        vx=(pt.x-lastX)/dt*16.666;
        vy=(pt.y-lastY)/dt*16.666;

        const nx=pt.x+offsetX;
        const ny=pt.y+offsetY;

        if(Math.abs(nx-homeX)>3 || Math.abs(ny-homeY)>3) moved=true;

        mc.x=nx;
        mc.y=ny;

        lastX=pt.x;
        lastY=pt.y;
        lastT=now;

        stage.update();
      });

      mc.on('pressup', function(){
        if(!dragging) return;
        dragging=false;
        returning=true;

        // Arranca la animación vinculada al globo al soltar.
        try {
          if(label && typeof root.gotoAndPlay==='function') {
            root.gotoAndPlay(label);
          } else if(typeof mc.play==='function') {
            mc.play();
          }
        } catch(e) {}
      });

      createjs.Ticker.on('tick', function(){
        if(!returning || dragging) return;

        mc.x += vx;
        mc.y += vy;

        const dx=homeX-mc.x;
        const dy=homeY-mc.y;

        vx = vx*0.78 + dx*0.10;
        vy = vy*0.78 + dy*0.10;

        if(Math.abs(dx)<0.6 && Math.abs(dy)<0.6 && Math.abs(vx)<0.6 && Math.abs(vy)<0.6){
          mc.x=homeX;
          mc.y=homeY;
          vx=0;
          vy=0;
          returning=false;
        }
      });
    }

    function trySetup(){
      let allFound=true;
      config.forEach(function(item){
        if(root[item.name]) {
          setupOne(root[item.name], item.label);
        } else {
          allFound=false;
        }
      });
      if(allFound) {
        root.__westTamboDragReady=true;
        console.log('Arrastres activos:', config.map(function(i){return i.name;}));
      }
    }

    // Espera a que la línea de tiempo llegue a la pantalla donde están los botones.
    const tickSetup=createjs.Ticker.on('tick', function(){
      if(root.currentFrame>=205 || root.paused){
        trySetup();
        if(root.__westTamboDragReady) createjs.Ticker.off('tick', tickSetup);
      }
    });

    // También intenta una vez por si ya está detenido en la pantalla final.
    setTimeout(trySetup, 300);
    setTimeout(trySetup, 1000);
  };
})();
</script>

		<canvas id="canvas" width="1080" height="1920" style="position: absolute; display: block; background-color:transparent;"></canvas>
		<div id="dom_overlay_container" style="pointer-events:none; overflow:hidden; width:1080px; height:1920px; position: absolute; left: 0px; top: 0px; display: block;">
		</div>
