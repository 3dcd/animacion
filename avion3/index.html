<html>
<head>
<meta charset="UTF-8">
<meta name="authoring-tool" content="Adobe_Animate_CC">
<title>avion2</title>
<!-- write your code here -->
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #ffffff;
  touch-action: none;
  overscroll-behavior: none;
}
#animation_container {
  position: absolute;
  left: 50%;
  top: 50%;
  transform-origin: 0 0;
}
#canvas {
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
}
</style>
<script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>
<script src="avion2.js"></script>
<script>
var canvas, stage, exportRoot, anim_container, dom_overlay_container, fnStartAnimation;
function init() {
	canvas = document.getElementById("canvas");
	anim_container = document.getElementById("animation_container");
	dom_overlay_container = document.getElementById("dom_overlay_container");
	var comp=AdobeAn.getComposition("9EB062EA1B1A418DB3F8466E5102B28B");
	var lib=comp.getLibrary();
	var loader = new createjs.LoadQueue(false);
	loader.addEventListener("fileload", function(evt){handleFileLoad(evt,comp)});
	loader.addEventListener("complete", function(evt){handleComplete(evt,comp)});
	var lib=comp.getLibrary();
	loader.loadManifest(lib.properties.manifest);
}
function handleFileLoad(evt, comp) {
	var images=comp.getImages();	
	if (evt && (evt.item.type == "image")) { images[evt.item.id] = evt.result; }	
}
function handleComplete(evt,comp) {
	//This function is always called, irrespective of the content. You can use the variable "stage" after it is created in token create_stage.
	var lib=comp.getLibrary();
	var ss=comp.getSpriteSheet();
	var queue = evt.target;
	var ssMetadata = lib.ssMetadata;
	for(i=0; i<ssMetadata.length; i++) {
		ss[ssMetadata[i].name] = new createjs.SpriteSheet( {"images": [queue.getResult(ssMetadata[i].name)], "frames": ssMetadata[i].frames} )
	}
	exportRoot = new lib.avion2();
	stage = new lib.Stage(canvas);	
	//Registers the "tick" event listener.
	fnStartAnimation = function() {
		stage.addChild(exportRoot);
		createjs.Ticker.framerate = lib.properties.fps;
		createjs.Ticker.addEventListener("tick", stage);
		setupAvionInteraction(lib);
	}	    
	//Code to support hidpi screens and responsive scaling.
	fitToMobileScreen();
	window.addEventListener('resize', fitToMobileScreen);	
	AdobeAn.compositionLoaded(lib.properties.id);
	fnStartAnimation();
}

function fitToMobileScreen() {
	var w = 1080, h = 1920;
	var scale = Math.min(window.innerWidth / w, window.innerHeight / h);
	anim_container.style.width = w + "px";
	anim_container.style.height = h + "px";
	anim_container.style.transform = "translate(-50%, -50%) scale(" + scale + ")";
}

function setupAvionInteraction(lib) {
	if (!stage || !exportRoot || !exportRoot.instance) return;
	createjs.Touch.enable(stage, true, false);
	stage.mouseMoveOutside = true;

	var avion = exportRoot.instance;
	// La timeline raíz traía el movimiento automático de subida/bajada: la frenamos.
	exportRoot.gotoAndStop(0);
	avion.x = 540;
	avion.y = 960;
	avion.regX = 0;
	avion.regY = 0;

	var clips = [avion.s_1, avion.s_2, avion.s_3];
	var s1 = avion.s_1, s2 = avion.s_2, s3 = avion.s_3;
	var totalFrames = 50;
	for (var i = 0; i < clips.length; i++) {
		if (clips[i] && clips[i].totalFrames) totalFrames = Math.max(totalFrames, clips[i].totalFrames);
	}

	var frame = 30; // frame 31 en Animate, porque CreateJS cuenta desde 0.
	var targetFrame = frame;
	var dragging = false;
	var lastX = 0, lastY = 0, startY = 0;
	var vx = 0;
	var sensitivity = 0.075; // frames por pixel horizontal.
	var friction = 0.92;

	function wrapFrame(v) {
		v = v % totalFrames;
		if (v < 0) v += totalFrames;
		return v;
	}

	function showOnly(which) {
		if (!s1 || !s2 || !s3) return;
		s1.visible = (which === 1);
		s2.visible = (which === 2);
		s3.visible = (which === 3);
	}

	function applyFrame() {
		var f = Math.round(wrapFrame(frame));
		for (var i = 0; i < clips.length; i++) {
			if (clips[i] && clips[i].gotoAndStop) clips[i].gotoAndStop(f);
		}
	}

	function applyVertical(dy) {
		// Ascensor vertical: arriba S1, medio S2, abajo S3.
		if (dy < -70) showOnly(1);
		else if (dy > 70) showOnly(3);
		else showOnly(2);
	}

	function pointerDown(evt) {
		dragging = true;
		vx = 0;
		lastX = evt.stageX;
		lastY = evt.stageY;
		startY = evt.stageY;
		applyVertical(0);
	}

	function pointerMove(evt) {
		if (!dragging) return;
		var dx = evt.stageX - lastX;
		var dyFromStart = evt.stageY - startY;
		vx = dx * sensitivity;
		frame = wrapFrame(frame + vx);
		lastX = evt.stageX;
		lastY = evt.stageY;
		applyVertical(dyFromStart);
		applyFrame();
	}

	function pointerUp() {
		dragging = false;
	}

	function tick() {
		if (!dragging && Math.abs(vx) > 0.015) {
			frame = wrapFrame(frame + vx);
			vx *= friction;
			applyFrame();
		}
	}

	showOnly(2);
	applyFrame();
	stage.on("stagemousedown", pointerDown);
	stage.on("stagemousemove", pointerMove);
	stage.on("stagemouseup", pointerUp);
	createjs.Ticker.on("tick", tick);
}

</script>

<body onload="init();" style="margin:0px;">
	<div id="animation_container" style="background-color:rgba(255, 255, 255, 1.00); width:1080px; height:1920px">
		<canvas id="canvas" width="1080" height="1920" style="position: absolute; display: block; background-color:rgba(255, 255, 255, 1.00);"></canvas>
		<div id="dom_overlay_container" style="pointer-events:none; overflow:hidden; width:1080px; height:1920px; position: absolute; left: 0px; top: 0px; display: block;">
		</div>
	</div>
</body>
