<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Banner Optimizado</title>

<style>
  /* Fondo negro y reseteo de márgenes */
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000000;
  }
  /* Contenedor Flexbox: la mejor técnica moderna para centrar en el medio exacto */
  #stage-wrap {
    position: fixed; inset: 0; overflow: hidden; background: #000000;
    display: flex; justify-content: center; align-items: center;
  }
  #animation_container {
    width: 1080px; /* Ancho de tu documento original */
    height: 1920px; /* Alto de tu documento original */
    position: relative;
    transform-origin: center center;
  }
  #canvas {
    position: absolute; left: 0; top: 0; display: block;
    width: 1080px; height: 1920px; background: #FCFCFC;
  }
</style>

<script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>
<script src="logo.js"></script>

<script>
var canvas, stage, exportRoot, anim_container, dom_overlay_container, fnStartAnimation;

function init() {
    canvas = document.getElementById("canvas");
    anim_container = document.getElementById("animation_container");
    dom_overlay_container = document.getElementById("dom_overlay_container");
    
    // Este ID larguísimo es tu composición específica, lo saqué de tu archivo
    var comp=AdobeAn.getComposition("39F8F0FF24A14F9AA9E95CAB9BADA657");
    var lib=comp.getLibrary();
    var loader = new createjs.LoadQueue(false);
    loader.addEventListener("fileload", function(evt){handleFileLoad(evt,comp)});
    loader.addEventListener("complete", function(evt){handleComplete(evt,comp)});
    var lib=comp.getLibrary();
    loader.loadManifest(lib.properties.manifest);
}

function handleFileLoad(evt, comp) {
    var images=comp.getImages();
    if (evt && (evt.item.type == "image")) { images[evt.item.id] = evt.result; }
}

function handleComplete(evt,comp) {
    var lib=comp.getLibrary();
    var ss=comp.getSpriteSheet();
    var queue = evt.target;
    var ssMetadata = lib.ssMetadata;
    for(i=0; i<ssMetadata.length; i++) {
        ss[ssMetadata[i].name] = new createjs.SpriteSheet( {"images": [queue.getResult(ssMetadata[i].name)], "frames": ssMetadata[i].frames} )
    }
    exportRoot = new lib.logo();
    stage = new lib.Stage(canvas);
    fnStartAnimation = function() {
        stage.addChild(exportRoot);
        createjs.Ticker.framerate = lib.properties.fps;
        createjs.Ticker.addEventListener("tick", stage);
    }
    AdobeAn.compositionLoaded(lib.properties.id);
    fnStartAnimation();
    
    // Disparamos nuestra matemática personalizada apenas carga la animación
    resizeToFit();
}

// ==========================================
// NUESTRA FÓRMULA DE ESCALADO PERFECTO
// ==========================================
function resizeToFit() {
  var iw = window.innerWidth;
  var ih = window.innerHeight;
  var w = 1080; // Tu ancho
  var h = 1920; // Tu alto
  
  // Calculamos la proporción matemática exacta para que no se deforme ni se recorte
  var sRatio = Math.min(iw / w, ih / h);
  
  // En vez de pelear con CreateJS, usamos CSS puro para escalar el bloque entero
  anim_container.style.transform = 'scale(' + sRatio + ')';
}

// Escuchar los cambios: si el usuario rota el teléfono, recalcula todo al instante
window.addEventListener('resize', resizeToFit);
window.addEventListener('orientationchange', function() { setTimeout(resizeToFit, 100); });
</script>
</head>
<body onload="init();">
    <div id="stage-wrap">
        <div id="animation_container">
            <canvas id="canvas"></canvas>
            <div id="dom_overlay_container"></div>
        </div>
    </div>
</body>
</html>
